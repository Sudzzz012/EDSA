<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login - Erase Debt SA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: linear-gradient(120deg, #003865, #005c97 85%);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .logo-container {
      margin-top: 40px;
      margin-bottom: 30px;
      text-align: center;
    }
    .logo-container img {
      height: 90px;
      border-radius: 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
      background: #fff;
      padding: 10px 28px;
    }
    h1 {
      color: #fff;
      letter-spacing: 1px;
      font-weight: 700;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 30px;
      font-size: 2.2rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .role-blocks {
      display: grid;
      grid-template-columns: repeat(2, 240px);
      gap: 36px;
      justify-content: center;
      align-items: center;
      margin-bottom: 40px;
    }
    .role-block {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 18px 2px rgba(30, 56, 90, 0.14);
      padding: 36px 0 30px 0;
      text-align: center;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.15s;
      font-weight: 700;
      font-size: 1.3rem;
      color: #005c97;
      border: 3px solid #f3f7fb;
      position: relative;
    }
    .role-block:hover {
      box-shadow: 0 8px 28px 4px rgba(0,92,151,0.22);
      transform: translateY(-4px) scale(1.04);
      border-color: #005c97;
      background: linear-gradient(115deg, #fafdff 60%, #e3edff 100%);
    }
    .role-icon {
      font-size: 2.7rem;
      margin-bottom: 16px;
      color: #0084c2;
      display: block;
    }
    .login-modal-bg {
      display: none;
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.22);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .login-modal-bg.active { display: flex; }
    .login-modal {
      background: #fff;
      padding: 34px 30px 24px 30px;
      border-radius: 18px;
      min-width: 320px;
      box-shadow: 0 8px 40px 2px rgba(0,50,101,0.20);
      text-align: center;
      position: relative;
      z-index: 999;
      animation: fadeInModal 0.25s;
    }
    @keyframes fadeInModal {
      from { opacity:0; transform: scale(0.9);}
      to { opacity:1; transform: scale(1);}
    }
    .login-modal h2 { font-size: 1.32rem; margin-bottom: 14px; color: #005c97; }
    .login-modal label { font-weight: 700; font-size: 1rem; margin-right: 6px; }
    .login-modal input {
      width: 90%; padding: 10px; border-radius: 8px;
      margin-bottom: 15px; font-size: 1rem; border: 1.2px solid #d6e3f7;
      transition: border-color 0.13s;
    }
    .login-modal input:focus { outline:none; border-color: #005c97; }
    .login-modal button {
      background: #005c97; color: #fff; border: none; border-radius: 8px;
      padding: 10px 30px; font-size: 1rem; cursor: pointer;
      font-weight: 700; margin-top: 8px; transition: background 0.13s;
      box-shadow: 0 1px 8px 1px rgba(0,70,151,0.09);
    }
    .login-modal button:hover { background: #003865; }
    .close-modal {
      position: absolute; top: 14px; right: 16px; font-size: 1.5rem;
      color: #888; cursor: pointer; background: none; border: none;
      transition: color 0.18s;
    }
    .close-modal:hover { color: #003865;}
    .login-error { color: #c70039; font-size: 0.98rem; margin-bottom: 8px;}
    @media (max-width: 600px) {
      .role-blocks { grid-template-columns: 1fr; gap: 20px;}
      .login-modal { min-width: 92vw;}
      .logo-container img { height: 60px;}
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="erase-debt-logo.jpg" alt="Erase Debt SA Logo"/>
  </div>
  <h1>Staff Login Portal</h1>
  <div class="role-blocks">
    <div class="role-block" data-role="agent">
      <span class="role-icon">👩‍💼</span>
      Agent
    </div>
    <div class="role-block" data-role="admin">
      <span class="role-icon">🛡️</span>
      Admin
    </div>
    <div class="role-block" data-role="admin_manager">
      <span class="role-icon">👔</span>
      Admin Manager
    </div>
    <div class="role-block" data-role="super">
      <span class="role-icon">🌟</span>
      Super User
    </div>
  </div>

  <!-- Login Modal -->
  <div class="login-modal-bg" id="modal-bg">
    <form class="login-modal" id="loginModal" onsubmit="return false;">
      <button class="close-modal" type="button" onclick="closeModal()">×</button>
      <h2 id="modal-title">Agent Login</h2>
      <div class="login-error" id="login-error" style="display:none;"></div>
      <label>Username<br/>
        <input type="text" id="username" autocomplete="username" required />
      </label>
      <br/>
      <label>Password<br/>
        <input type="password" id="password" autocomplete="current-password" required />
      </label>
      <br/>
      <button type="submit" onclick="submitLogin()">Login</button>
    </form>
  </div>

  <script>
    // Demo usernames/passwords for each role (Replace with real logic!)
    const userAccounts = {
      agent:    { username: "agent1",         password: "password123", dashboard: "agent-dashboard.html" },
      admin:    { username: "admin1",         password: "adminpass",   dashboard: "admin-dashboard.html" },
      admin_manager: { username: "manager1",  password: "managerpass", dashboard: "admin-manager-dashboard.html" },
      super:    { username: "superuser",      password: "superpass",   dashboard: "super-dashboard.html" }
    };

    let currentRole = "agent";

    document.querySelectorAll('.role-block').forEach(block => {
      block.onclick = function() {
        currentRole = block.getAttribute('data-role');
        document.getElementById('modal-title').textContent =
          block.textContent.trim() + " Login";
        document.getElementById('modal-bg').classList.add('active');
        document.getElementById('username').value = "";
        document.getElementById('password').value = "";
        document.getElementById('login-error').style.display = "none";
        setTimeout(()=>{ document.getElementById('username').focus(); }, 130);
      };
    });

    function closeModal() {
      document.getElementById('modal-bg').classList.remove('active');
    }

    function submitLogin() {
      let uname = document.getElementById('username').value.trim();
      let pwd   = document.getElementById('password').value.trim();
      let errorDiv = document.getElementById('login-error');

      // Demo authentication; replace with real system
      if (uname === userAccounts[currentRole].username &&
          pwd === userAccounts[currentRole].password) {
        sessionStorage.setItem('user_role', currentRole);
        // For agent, also store branch info if needed for filtering
        if (currentRole === "agent") {
          // Assign a branch; in real system, fetch from DB
          sessionStorage.setItem('branch_name', 'Erase Debt SA - ADMIN'); // Example branch
        }
        window.location.href = userAccounts[currentRole].dashboard;
      } else {
        errorDiv.textContent = "Incorrect username or password.";
        errorDiv.style.display = "block";
      }
    }

    // Allow Enter key to submit login form
    document.getElementById('loginModal').addEventListener('keydown', function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        submitLogin();
      }
    });
  </script>
</body>
</html>
