<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Staff Member | Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .form-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #2970ba;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2970ba;
    }

    .form-group input:disabled {
      background-color: #f8f9fa;
      cursor: not-allowed;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      text-align: center;
      font-weight: 600;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: #28a745;
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: #dc3545;
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .message.info {
      background: rgba(23, 162, 184, 0.1);
      color: #17a2b8;
      border: 1px solid rgba(23, 162, 184, 0.2);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-user-edit"></i> Edit Staff Member</h1>
      <a href="manage-staff.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Staff Management
      </a>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading staff member...
    </div>

    <div class="form-card" id="editForm" style="display: none;">
      <form id="staffEditForm">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="idNumber">ID Number</label>
            <input type="text" id="idNumber" name="idNumber" disabled>
          </div>
          <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="">Select Role</option>
              <option value="agent">Agent</option>
              <option value="admin">Admin</option>
              <option value="admin_manager">Admin Manager</option>
              <option value="super">Super User</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" name="branch" required>
              <option value="">Select Branch</option>
              <option>Boost My Credit Score</option>
              <option>Clean Credit Consultants</option>
              <option>Clean Slate Solutions - MSJ</option>
              <option>Clean Slate Solutions - RSJ</option>
              <option>Credifix SA</option>
              <option>Credit Boost SA</option>
              <option>Credit Renew SA</option>
              <option>Erase Debt SA - ADMIN</option>
              <option>Erase Debt SA - MP</option>
              <option>Erase Debt SA - SS</option>
              <option>Fix My Credit Score</option>
              <option>Get Credit SA</option>
              <option>Increase My Credit Score</option>
              <option>National Credit Solutions</option>
              <option>SA Blacklisting Busters</option>
              <option>SAZZ Debt Solutions</option>
              <option>Shield Credit Solutions</option>
              <option>South African Credit Score Experts - AA</option>
              <option>South African Credit Score Experts - QAA</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="active">Active</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="newPassword">New Password (optional)</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="Leave empty to keep current password">
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary" id="updateBtn">
            <i class="fas fa-save"></i> Update Staff Member
          </button>
          <button type="button" class="btn btn-danger" id="resetPasswordBtn">
            <i class="fas fa-key"></i> Send Password Reset
          </button>
        </div>

        <div id="message"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentStaffId = null;
    let currentStaff = null;

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'super') { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    // Get staff ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentStaffId = urlParams.get('id');

    if (!currentStaffId) {
      showMessage('No staff ID provided.', 'error');
      setTimeout(() => window.location.href = 'manage-staff.html', 2000);
    } else {
      loadStaffMember();
    }

    async function loadStaffMember() {
      try {
        const { data, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id', currentStaffId)
          .single();

        if (error || !data) {
          showMessage('Staff member not found.', 'error');
          setTimeout(() => window.location.href = 'manage-staff.html', 2000);
          return;
        }

        currentStaff = data;
        populateForm();
        
        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('editForm').style.display = 'block';

      } catch (error) {
        console.error('Error loading staff:', error);
        showMessage('Error loading staff member.', 'error');
      }
    }

    function populateForm() {
      document.getElementById('fullName').value = currentStaff.full_name || '';
      document.getElementById('email').value = currentStaff.email || '';
      document.getElementById('idNumber').value = currentStaff.id_number || '';
      document.getElementById('role').value = currentStaff.role || '';
      document.getElementById('branch').value = currentStaff.branch || '';
      document.getElementById('status').value = currentStaff.is_active ? 'active' : 'disabled';
    }

    function showMessage(message, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
    }

    // Form submission
    document.getElementById('staffEditForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const updateBtn = document.getElementById('updateBtn');
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validate passwords if provided
      if (newPassword || confirmPassword) {
        if (newPassword !== confirmPassword) {
          showMessage('Passwords do not match.', 'error');
          return;
        }
        if (newPassword.length < 6) {
          showMessage('Password must be at least 6 characters long.', 'error');
          return;
        }
      }

      updateBtn.disabled = true;
      showMessage('Updating staff member...', 'info');

      try {
        const updateData = {
          full_name: document.getElementById('fullName').value.trim(),
          email: document.getElementById('email').value.trim().toLowerCase(),
          role: document.getElementById('role').value,
          branch: document.getElementById('branch').value,
          status: document.getElementById('status').value,
          is_active: document.getElementById('status').value === 'active',
          updated_at: new Date().toISOString()
        };

        // Add password hash if new password provided
        if (newPassword) {
          updateData.password_hash = await bcrypt.hash(newPassword, 10);
        }

        const { error } = await supabase
          .from('edsa_users')
          .update(updateData)
          .eq('id', currentStaffId);

        if (error) {
          showMessage('Error updating staff member: ' + error.message, 'error');
          updateBtn.disabled = false;
          return;
        }

        showMessage('Staff member updated successfully!', 'success');
        
        // Clear password fields
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        
        // Redirect after success
        setTimeout(() => {
          window.location.href = 'manage-staff.html';
        }, 2000);

      } catch (error) {
        console.error('Error:', error);
        showMessage('Unexpected error: ' + error.message, 'error');
        updateBtn.disabled = false;
      }
    });

    // Password reset functionality
    document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
      if (!confirm('Send password reset email to this staff member?')) {
        return;
      }

      const resetBtn = document.getElementById('resetPasswordBtn');
      resetBtn.disabled = true;
      showMessage('Sending password reset email...', 'info');

      try {
        // Generate reset token
        const resetToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
        const expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(); // 24 hours

        // Store reset token in database (you'll need to create this table)
        const { error: tokenError } = await supabase
          .from('password_resets')
          .insert({
            user_id: currentStaffId,
            reset_token: resetToken,
            expires_at: expiresAt,
            used: false
          });

        if (tokenError) {
          console.log('Token storage error (table may not exist):', tokenError);
        }

        showMessage('Password reset functionality would send email here.', 'info');
        resetBtn.disabled = false;

      } catch (error) {
        console.error('Error:', error);
        showMessage('Error with reset functionality: ' + error.message, 'error');
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
