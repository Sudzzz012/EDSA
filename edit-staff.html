<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Staff Member | Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root{
      --blue:#2970ba; --blueDark:#003865; --ink:#14243b;
      --card:#ffffff; --muted:#445; --ring:#c7d8ef; --shadow:#2970ba33;
      --ok:#1b7e4e; --err:#c41111;
    }
    *{box-sizing:border-box}
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#003865,#005c97); margin:0; padding:24px; color:var(--ink); }
    .wrap { max-width: 880px; margin: 0 auto; }
    .header { display:flex; align-items:center; gap:16px; margin-bottom:14px; }
    .logo { width:110px; border-radius:12px; box-shadow:0 6px 24px #2970ba55; background:#fff; padding:6px; }
    .title { color:#fff; font-size:1.9rem; font-weight:800; letter-spacing:-.2px; }
    .card { background:var(--card); border-radius:18px; box-shadow:0 16px 46px var(--shadow); padding:22px; }
    .desc { color:var(--muted); text-align:center; margin:6px 0 18px; }
    label { display:block; font-weight:700; margin:10px 0 6px; }
    input, select {
      width:100%; padding:12px; border-radius:10px; border:1px solid var(--ring); font-size:1rem;
      transition:border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus{ outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(41,112,186,.12); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:820px){ .row { grid-template-columns:1fr; } }
    .actions { display:flex; gap:12px; align-items:center; margin-top:16px; flex-wrap:wrap; }
    button {
      padding:14px 18px; border:none; border-radius:12px; background:var(--blue); color:#fff; font-weight:800; cursor:pointer;
      box-shadow:0 8px 24px var(--shadow); transition:background .15s, transform .08s;
    }
    button:hover{ background:var(--blueDark); }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .btn-danger { background:#dc3545; }
    .btn-danger:hover { background:#c82333; }
    .link { color:var(--blue); font-weight:700; text-decoration:none; }
    .msg { margin-top:14px; font-weight:700; text-align:center; white-space:pre-wrap; }
    .ok { color:var(--ok); }
    .err{ color:var(--err); }
    .loading { text-align:center; padding:2rem; color:#666; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <img src="erase-debt-logo.png" alt="Erase Debt SA" class="logo"/>
      <div class="title">Edit Staff Member</div>
    </div>

    <div class="card">
      <div id="loadingDiv" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading staff member...
      </div>

      <div id="editForm" style="display:none;">
        <div class="desc">
          Update staff member information. Leave password field empty to keep current password.
        </div>

        <form id="staffEditForm" autocomplete="off">
          <div class="row">
            <div>
              <label>Full Name</label>
              <input id="full_name" required />
            </div>
            <div>
              <label>Email Address</label>
              <input id="email" type="email" required />
            </div>
          </div>

          <div class="row">
            <div>
              <label>ID Number</label>
              <input id="id_number" required readonly style="background:#f8f9fa;" />
            </div>
            <div>
              <label>Role</label>
              <select id="role" required>
                <option value="">Select Role</option>
                <option value="agent">Agent</option>
                <option value="admin">Admin</option>
                <option value="admin_manager">Admin Manager</option>
                <option value="super">Super User</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>Branch</label>
              <select id="branch" required>
                <option value="">Select Branch</option>
                <option>Boost My Credit Score</option>
                <option>Clean Credit Consultants</option>
                <option>Clean Slate Solutions - MSJ</option>
                <option>Clean Slate Solutions - RSJ</option>
                <option>Credifix SA</option>
                <option>Credit Boost SA</option>
                <option>Credit Renew SA</option>
                <option>Erase Debt SA - ADMIN</option>
                <option>Erase Debt SA - MP</option>
                <option>Erase Debt SA - SS</option>
                <option>Fix My Credit Score</option>
                <option>Get Credit SA</option>
                <option>Increase My Credit Score</option>
                <option>National Credit Solutions</option>
                <option>SA Blacklisting Busters</option>
                <option>SAZZ Debt Solutions</option>
                <option>Shield Credit Solutions</option>
                <option>South African Credit Score Experts - AA</option>
                <option>South African Credit Score Experts - QAA</option>
              </select>
            </div>
            <div>
              <label>Status</label>
              <select id="status" required>
                <option value="active">Active</option>
                <option value="disabled">Disabled</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label>New Password (optional)</label>
              <input id="new_password" type="password" placeholder="Leave empty to keep current password" />
            </div>
            <div>
              <label>Confirm New Password</label>
              <input id="confirm_password" type="password" placeholder="Confirm new password" />
            </div>
          </div>

          <div class="actions">
            <button type="submit" id="updateBtn">Update Staff Member</button>
            <button type="button" class="btn-danger" id="resetPasswordBtn">Send Password Reset</button>
            <a class="link" href="manage-staff.html">← Back to Staff Management</a>
          </div>

          <div id="msg" class="msg"></div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentStaffId = null;
    let currentStaff = null;

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'super') { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    // Get staff ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentStaffId = urlParams.get('id');

    if (!currentStaffId) {
      document.getElementById('loadingDiv').innerHTML = '<div class="err">No staff ID provided. <a href="manage-staff.html">Go back to staff management</a></div>';
    } else {
      loadStaffMember();
    }

    async function loadStaffMember() {
      try {
        const { data, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id', currentStaffId)
          .single();

        if (error || !data) {
          document.getElementById('loadingDiv').innerHTML = '<div class="err">Staff member not found. <a href="manage-staff.html">Go back to staff management</a></div>';
          return;
        }

        currentStaff = data;
        populateForm();
        
        document.getElementById('loadingDiv').style.display = 'none';
        document.getElementById('editForm').style.display = 'block';

      } catch (error) {
        console.error('Error loading staff:', error);
        document.getElementById('loadingDiv').innerHTML = '<div class="err">Error loading staff member. <a href="manage-staff.html">Go back to staff management</a></div>';
      }
    }

    function populateForm() {
      document.getElementById('full_name').value = currentStaff.full_name || '';
      document.getElementById('email').value = currentStaff.email || '';
      document.getElementById('id_number').value = currentStaff.id_number || '';
      document.getElementById('role').value = currentStaff.role || '';
      document.getElementById('branch').value = currentStaff.branch || '';
      document.getElementById('status').value = currentStaff.is_active ? 'active' : 'disabled';
    }

    function setStatus(text, isError = false) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = 'msg ' + (isError ? 'err' : 'ok');
    }

    // Form submission
    document.getElementById('staffEditForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const updateBtn = document.getElementById('updateBtn');
      const newPassword = document.getElementById('new_password').value;
      const confirmPassword = document.getElementById('confirm_password').value;

      // Validate passwords if provided
      if (newPassword || confirmPassword) {
        if (newPassword !== confirmPassword) {
          setStatus('Passwords do not match.', true);
          return;
        }
        if (newPassword.length < 6) {
          setStatus('Password must be at least 6 characters long.', true);
          return;
        }
      }

      updateBtn.disabled = true;
      setStatus('Updating staff member...');

      try {
        const updateData = {
          full_name: document.getElementById('full_name').value.trim(),
          email: document.getElementById('email').value.trim().toLowerCase(),
          role: document.getElementById('role').value,
          branch: document.getElementById('branch').value,
          status: document.getElementById('status').value,
          is_active: document.getElementById('status').value === 'active',
          updated_at: new Date().toISOString()
        };

        // Add password hash if new password provided
        if (newPassword) {
          updateData.password_hash = await bcrypt.hash(newPassword, 10);
        }

        const { error } = await supabase
          .from('edsa_users')
          .update(updateData)
          .eq('id', currentStaffId);

        if (error) {
          setStatus('Error updating staff member: ' + error.message, true);
          updateBtn.disabled = false;
          return;
        }

        setStatus('Staff member updated successfully!');
        
        // Clear password fields
        document.getElementById('new_password').value = '';
        document.getElementById('confirm_password').value = '';
        
        // Redirect after success
        setTimeout(() => {
          window.location.href = 'manage-staff.html';
        }, 2000);

      } catch (error) {
        console.error('Error:', error);
        setStatus('Unexpected error: ' + error.message, true);
        updateBtn.disabled = false;
      }
    });

    // Password reset functionality
    document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
      if (!confirm('Send password reset email to this staff member?')) {
        return;
      }

      const resetBtn = document.getElementById('resetPasswordBtn');
      resetBtn.disabled = true;
      setStatus('Sending password reset email...');

      try {
        // Generate reset token
        const resetToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
        const expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(); // 24 hours

        // Store reset token in database
        const { error: tokenError } = await supabase
          .from('password_resets')
          .insert({
            user_id: currentStaffId,
            reset_token: resetToken,
            expires_at: expiresAt,
            used: false
          });

        if (tokenError) {
          setStatus('Error creating reset token: ' + tokenError.message, true);
          resetBtn.disabled = false;
          return;
        }

        // Call password reset function
        const response = await fetch(`${supabase.supabaseUrl}/functions/v1/send-password-reset`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            to: currentStaff.email,
            full_name: currentStaff.full_name,
            id_number: currentStaff.id_number,
            reset_token: resetToken
          })
        });

        if (!response.ok) {
          setStatus('Error sending reset email. Please try again.', true);
          resetBtn.disabled = false;
          return;
        }

        setStatus('Password reset email sent successfully!');
        resetBtn.disabled = false;

      } catch (error) {
        console.error('Error:', error);
        setStatus('Error sending reset email: ' + error.message, true);
        resetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
