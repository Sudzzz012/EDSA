<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Staff Member - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn {
      background: #2970ba;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.3s;
    }

    .back-btn:hover {
      background: #003865;
    }

    .edit-form {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2970ba;
      box-shadow: 0 0 0 3px rgba(41, 112, 186, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: #155724;
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: #721c24;
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .form-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-user-edit"></i> Edit Staff Member</h1>
      <a href="manage-staff.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Staff Management
      </a>
    </div>

    <div class="edit-form">
      <div id="loadingMessage" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading staff member details...
      </div>

      <form id="editStaffForm" style="display: none;">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="idNumber">ID Number</label>
            <input type="text" id="idNumber" name="idNumber" required readonly>
          </div>
          <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="agent">Agent</option>
              <option value="admin">Admin</option>
              <option value="admin_manager">Admin Manager</option>
              <option value="super">Super User</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" name="branch" required>
              <option>Erase Debt SA - ADMIN</option>
              <option>Erase Debt SA - MP</option>
              <option>Erase Debt SA - SS</option>
              <option>Clean Slate Solutions - MSJ</option>
              <option>Clean Slate Solutions - RSJ</option>
              <option>Boost My Credit Score</option>
              <option>Fix My Credit Score</option>
              <option>Credit Boost SA</option>
              <option>Credit Renew SA</option>
              <option>National Credit Solutions</option>
              <option>Get Credit SA</option>
              <option>Shield Credit Solutions</option>
              <option>SAZZ Debt Solutions</option>
              <option>Clean Credit Consultants</option>
              <option>SA Blacklisting Busters</option>
              <option>Increase My Credit Score</option>
              <option>South African Credit Score Experts - AA</option>
              <option>South African Credit Score Experts - QAA</option>
              <option>Credifix SA</option>
            </select>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="active">Active</option>
              <option value="disabled">Disabled</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save"></i> Save Changes
          </button>
          <button type="button" class="btn btn-danger" onclick="resetPassword()">
            <i class="fas fa-key"></i> Reset Password
          </button>
        </div>

        <div id="message"></div>
      </form>
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentStaffId = null;

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || (sess.role !== 'super' && sess.role !== 'admin_manager')) { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    // Get staff ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    currentStaffId = urlParams.get('id');

    if (!currentStaffId) {
      showMessage('No staff member ID provided.', 'error');
      setTimeout(() => {
        window.location.href = 'manage-staff.html';
      }, 2000);
    } else {
      loadStaffMember();
    }

    async function loadStaffMember() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id', currentStaffId)
          .single();

        if (error) {
          console.error('Error loading staff member:', error);
          showMessage('Error loading staff member details.', 'error');
          return;
        }

        if (!staff) {
          showMessage('Staff member not found.', 'error');
          return;
        }

        // Populate form
        document.getElementById('fullName').value = staff.full_name || '';
        document.getElementById('email').value = staff.email || '';
        document.getElementById('idNumber').value = staff.id_number || '';
        document.getElementById('role').value = staff.role || '';
        document.getElementById('branch').value = staff.branch || '';
        document.getElementById('status').value = staff.status || 'active';

        // Show form
        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('editStaffForm').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        showMessage('An unexpected error occurred.', 'error');
      }
    }

    // Handle form submission
    document.getElementById('editStaffForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const updateData = {
        full_name: formData.get('fullName'),
        email: formData.get('email').toLowerCase(),
        role: formData.get('role'),
        branch: formData.get('branch'),
        status: formData.get('status'),
        is_active: formData.get('status') === 'active'
      };

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update(updateData)
          .eq('id', currentStaffId);

        if (error) {
          console.error('Error updating staff member:', error);
          showMessage('Error updating staff member: ' + error.message, 'error');
          return;
        }

        showMessage('Staff member updated successfully!', 'success');
        
        // Redirect back to manage staff after a delay
        setTimeout(() => {
          window.location.href = 'manage-staff.html';
        }, 2000);

      } catch (error) {
        console.error('Error:', error);
        showMessage('An unexpected error occurred.', 'error');
      }
    });

    // Reset password function
    window.resetPassword = async function() {
      if (!confirm('Are you sure you want to reset this user\'s password? They will receive an email with instructions.')) {
        return;
      }

      try {
        // Get current staff details
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id', currentStaffId)
          .single();

        if (error || !staff) {
          showMessage('Error loading staff details for password reset.', 'error');
          return;
        }

        // Generate reset token
        const resetToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
        
        // Store reset token in database
        const { error: insertError } = await supabase
          .from('password_resets')
          .insert({
            user_id: staff.id,
            reset_token: resetToken,
            expires_at: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString() // 24 hours
          });

        if (insertError) {
          console.error('Error storing reset token:', insertError);
          showMessage('Error processing password reset.', 'error');
          return;
        }

        showMessage('Password reset initiated. The user will receive an email with instructions.', 'success');

      } catch (error) {
        console.error('Password reset error:', error);
        showMessage('An error occurred during password reset.', 'error');
      }
    };

    function showMessage(message, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = `<div class="message ${type}"><i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>${message}</div>`;
    }
  </script>
</body>
</html>
