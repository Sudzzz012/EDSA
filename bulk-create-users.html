    const allUsers = [...staffUsers, ...agentUsers];
    
    document.getElementById('userCount').textContent = allUsers.length;

    let currentProgress = 0;
    let logMessages = [];

    function updateProgress(current, total) {
      currentProgress = (current / total) * 100;
      document.getElementById('progressBar').style.width = currentProgress + '%';
    }

    function addLog(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      logMessages.push(`[${timestamp}] ${message}`);
      const logEl = document.getElementById('log');
      logEl.innerHTML = logMessages.join('\n');
      logEl.scrollTop = logEl.scrollHeight;
      console.log(message);
    }

    function showStatus(message, type = 'info') {
      document.getElementById('status').innerHTML = `<div class="${type}">${message}</div>`;
    }

    window.showUserList = function() {
      const logEl = document.getElementById('log');
      logEl.style.display = 'block';
      logMessages = [];
      
      addLog('=== USER LIST ===');
      allUsers.forEach((user, index) => {
        addLog(`${index + 1}. ${user.name} (${user.role.toUpperCase()}) - ${user.email} - ID: ${user.id} - Branch: ${user.branch}`);
      });
      addLog('=== END LIST ===');
    };

    window.createAllUsers = async function() {
      const progressContainer = document.getElementById('progressContainer');
      const logEl = document.getElementById('log');
      
      progressContainer.style.display = 'block';
      logEl.style.display = 'block';
      logMessages = [];
      
      showStatus('🚀 Starting bulk user creation...', 'info');
      addLog('Starting bulk user creation process...');
      
      let successCount = 0;
      let errorCount = 0;
      let skippedCount = 0;

      try {
        // Hash the common password once
        const commonPassword = 'password@123';
        addLog(`Hashing common password: ${commonPassword}`);
        const password_hash = await bcrypt.hash(commonPassword, 10);
        addLog('Password hashed successfully');

        for (let i = 0; i < allUsers.length; i++) {
          const user = allUsers[i];
          updateProgress(i, allUsers.length);
          
          addLog(`\n--- Processing ${i + 1}/${allUsers.length}: ${user.name} ---`);
          
          try {
            // Check if user already exists
            const { data: existingUser } = await supabase
              .from('edsa_users')
              .select('id')
              .eq('id_number', user.id)
              .maybeSingle();

            if (existingUser) {
              addLog(`⚠️ User ${user.name} already exists, skipping...`);
              skippedCount++;
              continue;
            }

            // Create user
            const { data, error } = await supabase
              .from('edsa_users')
              .insert({
                full_name: user.name,
                email: user.email.toLowerCase(),
                id_number: user.id,
                password_hash: password_hash,
                role: user.role,
                branch: user.branch,
                status: 'active',
                is_active: true
              })
              .select()
              .single();

            if (error) {
              addLog(`❌ Error creating ${user.name}: ${error.message}`);
              errorCount++;
            } else {
              addLog(`✅ Created ${user.name} successfully (Role: ${user.role.toUpperCase()})`);
              successCount++;
            }

          } catch (error) {
            addLog(`❌ Exception for ${user.name}: ${error.message}`);
            errorCount++;
          }

          // Small delay to avoid overwhelming the database
          await new Promise(resolve => setTimeout(resolve, 50));
        }

        updateProgress(allUsers.length, allUsers.length);
        
        addLog(`\n=== FINAL RESULTS ===`);
        addLog(`✅ Successfully created: ${successCount} users`);
        addLog(`⚠️ Skipped (already exists): ${skippedCount} users`);
        addLog(`❌ Errors: ${errorCount} users`);
        addLog(`📊 Total processed: ${allUsers.length} users`);
        
        if (successCount > 0) {
          showStatus(`🎉 Bulk creation completed! Created ${successCount} users with password: password@123`, 'success');
        } else if (skippedCount === allUsers.length) {
          showStatus(`ℹ️ All users already exist in the system`, 'warning');
        } else {
          showStatus(`⚠️ Completed with ${errorCount} errors. Check log for details.`, 'warning');
        }

      } catch (error) {
        addLog(`💥 Fatal error: ${error.message}`);
        showStatus('❌ Bulk creation failed. Check log for details.', 'error');
      }
    };

    window.clearAllUsers = async function() {
      if (!confirm('⚠️ WARNING: This will DELETE ALL staff users except the super admin. Are you absolutely sure?')) {
        return;
      }

      if (!confirm('🚨 FINAL WARNING: This action cannot be undone. All staff accounts will be permanently deleted!')) {
        return;
      }

      const logEl = document.getElementById('log');
      logEl.style.display = 'block';
      logMessages = [];
      
      showStatus('🗑️ Clearing all users...', 'warning');
      addLog('Starting user deletion process...');
      
      try {
        // Delete all users except super admin
        const { data, error } = await supabase
          .from('edsa_users')
          .delete()
          .neq('id_number', '8804015196086') // Keep the super admin
          .select();

        if (error) {
          addLog(`❌ Error deleting users: ${error.message}`);
          showStatus('❌ Failed to clear users', 'error');
        } else {
          const deletedCount = data ? data.length : 0;
          addLog(`✅ Deleted ${deletedCount} users successfully`);
          addLog('🔒 Super admin account preserved');
          showStatus(`✅ Cleared ${deletedCount} users. Super admin preserved.`, 'success');
        }

      } catch (error) {
        addLog(`💥 Fatal error: ${error.message}`);
        showStatus('❌ Failed to clear users', 'error');
      }
    };
