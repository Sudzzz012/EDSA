<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Sales - Agent Dashboard</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .search-filters {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-filters input,
    .search-filters select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    .clients-table {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: var(--primary);
      position: sticky;
      top: 0;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending_verification {
      background: rgba(255, 193, 7, 0.2);
      color: #856404;
    }

    .status-active {
      background: rgba(40, 167, 69, 0.2);
      color: var(--success);
    }

    .status-completed {
      background: rgba(23, 162, 184, 0.2);
      color: var(--info);
    }

    .status-cancelled {
      background: rgba(220, 53, 69, 0.2);
      color: var(--danger);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #666;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .search-filters {
        flex-direction: column;
        align-items: stretch;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-chart-line"></i> My Sales</h1>
      <a href="agent-dashboard.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalSales">0</div>
        <div class="stat-label">Total Sales</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="monthSales">0</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalValue">R 0</div>
        <div class="stat-label">Total Value</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeSales">0</div>
        <div class="stat-label">Active Sales</div>
      </div>
    </div>

    <div class="search-filters">
      <input type="text" id="searchInput" placeholder="Search by name, ID, or email..." style="flex: 1; min-width: 250px;">
      <select id="statusFilter">
        <option value="">All Status</option>
        <option value="pending_verification">Pending Verification</option>
        <option value="active">Active</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <select id="serviceFilter">
        <option value="">All Services</option>
        <option value="Service 1A - DRR C and D3 (Still Paying the DC)">Service 1A</option>
        <option value="Service 1B - DRR C and D3 (No Longer Paying the DC)">Service 1B</option>
        <option value="Service 2 - D4 BELOW 12M">Service 2</option>
        <option value="Service 3 - D4 AITC (4-in-1 Credit Report)">Service 3</option>
        <option value="Service 4 - NL/ITC Credit Bureau Advice">Service 4</option>
        <option value="Service 5 - NL ITC Clearance">Service 5</option>
        <option value="Service 6 - RN A Status - NL Removals">Service 6</option>
        <option value="Service 7 - RN Other Status / NL Removal">Service 7</option>
      </select>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading your sales...
    </div>

    <div class="clients-table" id="clientsTable" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Sale Reference</th>
            <th>Client Name</th>
            <th>ID Number</th>
            <th>Service Type</th>
            <th>Total Amount</th>
            <th>Monthly Payment</th>
            <th>Status</th>
            <th>Sale Date</th>
          </tr>
        </thead>
        <tbody id="clientsBody">
          <!-- Clients will be loaded here -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentAgent = null;
    let allClients = [];

    // Check authentication
    function checkAuth() {
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'agent') { 
          window.location.href = 'staff-login.html'; 
          return false; 
        }
        currentAgent = sess;
        return true;
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
        return false;
      }
    }

    // Initialize page
    if (!checkAuth()) {
      // Redirect will happen in checkAuth
    } else {
      loadAgentSales();
    }

    async function loadAgentSales() {
      try {
        // Load clients captured by this agent
        const { data: clients, error } = await supabase
          .from('edsa_client_database')
          .select('*')
          .ilike('agent_name', `%${currentAgent.name}%`)
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading clients:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading your sales.';
          return;
        }

        allClients = clients || [];
        updateStats();
        displayClients(allClients);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('clientsTable').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred.';
      }
    }

    function updateStats() {
      const total = allClients.length;
      
      // This month's sales
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const monthSales = allClients.filter(client => {
        const clientDate = new Date(client.created_at || client.sale_date);
        return clientDate.getMonth() === currentMonth && clientDate.getFullYear() === currentYear;
      }).length;

      // Total value
      const totalValue = allClients.reduce((sum, client) => sum + (client.total_amount || 0), 0);

      // Active sales
      const activeSales = allClients.filter(client => 
        client.status === 'active' || client.status === 'pending_verification'
      ).length;

      document.getElementById('totalSales').textContent = total;
      document.getElementById('monthSales').textContent = monthSales;
      document.getElementById('totalValue').textContent = `R ${totalValue.toLocaleString()}`;
      document.getElementById('activeSales').textContent = activeSales;
    }

    function displayClients(clients) {
      const tbody = document.getElementById('clientsBody');
      
      if (!clients || clients.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="no-data"><i class="fas fa-inbox"></i><br>No sales found. Start capturing clients to see them here!</td></tr>';
        return;
      }

      const rows = clients.map(client => {
        const statusClass = `status-${client.status || 'pending_verification'}`;
        const saleDate = client.sale_date ? new Date(client.sale_date).toLocaleDateString() : 
                        client.created_at ? new Date(client.created_at).toLocaleDateString() : 'N/A';
        
        return `
          <tr>
            <td><strong>${client.sale_reference || 'N/A'}</strong></td>
            <td>${client.first_name} ${client.last_name}</td>
            <td>${client.client_id_number || 'N/A'}</td>
            <td style="font-size: 0.9em;">${client.service_type || 'N/A'}</td>
            <td><strong>R ${(client.total_amount || 0).toLocaleString()}</strong></td>
            <td>R ${(client.monthly_payment || 0).toLocaleString()}</td>
            <td><span class="status-badge ${statusClass}">${(client.status || 'pending').replace('_', ' ')}</span></td>
            <td>${saleDate}</td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    // Search and filter functionality
    document.getElementById('searchInput').addEventListener('input', filterClients);
    document.getElementById('statusFilter').addEventListener('change', filterClients);
    document.getElementById('serviceFilter').addEventListener('change', filterClients);

    function filterClients() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const serviceFilter = document.getElementById('serviceFilter').value;

      let filtered = allClients;

      if (searchTerm) {
        filtered = filtered.filter(client =>
          `${client.first_name} ${client.last_name}`.toLowerCase().includes(searchTerm) ||
          (client.client_id_number && client.client_id_number.toString().includes(searchTerm)) ||
          (client.email && client.email.toLowerCase().includes(searchTerm)) ||
          (client.sale_reference && client.sale_reference.toLowerCase().includes(searchTerm))
        );
      }

      if (statusFilter) {
        filtered = filtered.filter(client => client.status === statusFilter);
      }

      if (serviceFilter) {
        filtered = filtered.filter(client => client.service_type === serviceFilter);
      }

      displayClients(filtered);
    }
  </script>
</body>
</html>
