<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients Dashboard - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #2970ba;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .clients-table {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #2970ba;
      position: sticky;
      top: 0;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .status-cancelled {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .client-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.7rem;
    }

    .btn-edit {
      background: #17a2b8;
      color: white;
    }

    .btn-edit:hover {
      background: #138496;
    }

    .btn-view {
      background: #28a745;
      color: white;
    }

    .btn-view:hover {
      background: #218838;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-select, .search-input {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
    }

    .search-input {
      min-width: 250px;
    }

    .currency {
      color: #28a745;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .header-actions {
        flex-direction: column;
        width: 100%;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters {
        flex-direction: column;
      }

      .client-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users"></i> Clients Database</h1>
      <div class="header-actions">
        <a href="client-capture.html" class="btn btn-primary">
          <i class="fas fa-user-plus"></i> Add New Client
        </a>
        <a href="super-dashboard.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalClients">0</div>
        <div class="stat-label">Total Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeClients">0</div>
        <div class="stat-label">Active Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="pendingClients">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalRevenue">R 0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
    </div>

    <div class="filters">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by name, email, or ID...">
      <select class="filter-select" id="statusFilter">
        <option value="">All Status</option>
        <option value="Active">Active</option>
        <option value="Pending">Pending</option>
        <option value="Cancelled">Cancelled</option>
      </select>
      <select class="filter-select" id="serviceFilter">
        <option value="">All Services</option>
        <option value="SERVICE 1 - DRR(C & D3) - NP">Service 1 - DRR (Not Paying)</option>
        <option value="SERVICE 1 - DRR(C & D3) - P">Service 1 - DRR (Paying)</option>
        <option value="SERVICE 2 - D4 - BELOW 12M">Service 2 - D4 Below 12M</option>
        <option value="SERVICE 3 - D4 - AITC">Service 3 - D4 AITC</option>
        <option value="SERVICE 4 - NL/CR">Service 4 - NL/CR</option>
        <option value="SERVICE 5 - NL ITC CLEARANCE">Service 5 - NL ITC</option>
        <option value="SERVICE 6 - RN - A - NL">Service 6 - RN A NL</option>
        <option value="SERVICE 7 - RN - OTHER/NL">Service 7 - RN Other</option>
      </select>
      <select class="filter-select" id="branchFilter">
        <option value="">All Branches</option>
        <option value="Erase Debt SA - ADMIN">EDSA - ADMIN</option>
        <option value="Erase Debt SA - MP">EDSA - MP</option>
        <option value="Erase Debt SA - SS">EDSA - SS</option>
      </select>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading clients...
    </div>

    <div class="clients-table" id="clientsTable" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Client ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Service Type</th>
            <th>Branch</th>
            <th>Agent</th>
            <th>Total Amount</th>
            <th>Monthly Payment</th>
            <th>Payments Made</th>
            <th>Status</th>
            <th>Sale Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="clientsBody">
          <!-- Clients will be loaded here -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let allClients = [];

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess) { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    async function loadClients() {
      try {
        const { data: clients, error } = await supabase
          .from('edsa_client_database')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading clients:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading clients.';
          return;
        }

        allClients = clients || [];
        updateStats();
        displayClients(allClients);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('clientsTable').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred.';
      }
    }

    function updateStats() {
      const total = allClients.length;
      const active = allClients.filter(c => c.status === 'Active').length;
      const pending = allClients.filter(c => c.status === 'Pending').length;
      const totalRevenue = allClients.reduce((sum, c) => sum + (parseFloat(c.total_amount) || 0), 0);

      document.getElementById('totalClients').textContent = total;
      document.getElementById('activeClients').textContent = active;
      document.getElementById('pendingClients').textContent = pending;
      document.getElementById('totalRevenue').textContent = `R ${totalRevenue.toLocaleString()}`;
    }

    function displayClients(clients) {
      const tbody = document.getElementById('clientsBody');
      
      if (!clients || clients.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" style="text-align: center; color: #666;">No clients found</td></tr>';
        return;
      }

      const rows = clients.map(client => {
        const statusClass = `status-${(client.status || 'pending').toLowerCase()}`;
        const saleDate = client.sale_date ? new Date(client.sale_date).toLocaleDateString() : 'N/A';
        const totalAmount = parseFloat(client.total_amount) || 0;
        const monthlyPayment = parseFloat(client.monthly_payment) || 0;
        
        return `
          <tr>
            <td>${client.client_id_number || 'N/A'}</td>
            <td>${(client.first_name || '') + ' ' + (client.last_name || '')}</td>
            <td>${client.email || 'N/A'}</td>
            <td>${client.phone || 'N/A'}</td>
            <td style="font-size: 0.8rem;">${client.service_type || 'N/A'}</td>
            <td>${client.branch_name || 'N/A'}</td>
            <td>${client.agent_name || 'N/A'}</td>
            <td class="currency">R ${totalAmount.toLocaleString()}</td>
            <td class="currency">R ${monthlyPayment.toLocaleString()}</td>
            <td>${client.total_no_payments_made || '0'}</td>
            <td><span class="status-badge ${statusClass}">${client.status || 'pending'}</span></td>
            <td>${saleDate}</td>
            <td>
              <div class="client-actions">
                <button class="btn btn-view btn-sm" onclick="viewClient('${client.id}')">
                  <i class="fas fa-eye"></i> View
                </button>
                <button class="btn btn-edit btn-sm" onclick="editClient('${client.id}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    // Filter functionality
    document.getElementById('searchInput').addEventListener('input', filterClients);
    document.getElementById('statusFilter').addEventListener('change', filterClients);
    document.getElementById('serviceFilter').addEventListener('change', filterClients);
    document.getElementById('branchFilter').addEventListener('change', filterClients);

    function filterClients() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const statusFilter = document.getElementById('statusFilter').value;
      const serviceFilter = document.getElementById('serviceFilter').value;
      const branchFilter = document.getElementById('branchFilter').value;

      let filtered = allClients;

      if (searchTerm) {
        filtered = filtered.filter(c => 
          (c.first_name || '').toLowerCase().includes(searchTerm) ||
          (c.last_name || '').toLowerCase().includes(searchTerm) ||
          (c.email || '').toLowerCase().includes(searchTerm) ||
          (c.client_id_number || '').toString().includes(searchTerm)
        );
      }

      if (statusFilter) {
        filtered = filtered.filter(c => c.status === statusFilter);
      }

      if (serviceFilter) {
        filtered = filtered.filter(c => c.service_type === serviceFilter);
      }

      if (branchFilter) {
        filtered = filtered.filter(c => c.branch_name === branchFilter);
      }

      displayClients(filtered);
    }

    // Client actions
    window.viewClient = function(clientId) {
      const client = allClients.find(c => c.id === clientId);
      if (client) {
        const details = `
Client Details:

Name: ${client.first_name} ${client.last_name}
ID: ${client.client_id_number}
Email: ${client.email}
Phone: ${client.phone}
Service: ${client.service_type}
Branch: ${client.branch_name}
Agent: ${client.agent_name}
Total Amount: R ${(parseFloat(client.total_amount) || 0).toLocaleString()}
Monthly Payment: R ${(parseFloat(client.monthly_payment) || 0).toLocaleString()}
Payments Made: ${client.total_no_payments_made || '0'}
Missed Payments: ${client.total_no_missed_payments || '0'}
Status: ${client.status}
Sale Date: ${client.sale_date ? new Date(client.sale_date).toLocaleDateString() : 'N/A'}
Sale Reference: ${client.sale_reference || 'N/A'}
        `;
        alert(details);
      }
    };

    window.editClient = function(clientId) {
      // For now, just show an alert. In a full implementation, this would open an edit form
      alert(`Edit functionality for client ID: ${clientId}\n\nThis would open an edit form to modify client details.`);
    };

    // Load clients on page load
    loadClients();
  </script>
</body>
</html>
