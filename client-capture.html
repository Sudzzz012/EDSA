<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Client Capture - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
      justify-content: center;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .form-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
    }

    .form-section h2 {
      color: var(--primary);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(41, 112, 186, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-clipboard-list"></i> Client Capture</h1>
      <a href="agent-dashboard.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>

    <div class="form-card">
      <form id="clientForm">
        <div class="form-grid">
          <!-- Personal Information -->
          <div class="form-section">
            <h2><i class="fas fa-user"></i> Personal Information</h2>
            
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" name="first_name" required>
              </div>
              <div class="form-group">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" name="last_name" required>
              </div>
            </div>

            <div class="form-group">
              <label for="idNumber">ID Number *</label>
              <input type="text" id="idNumber" name="client_id_number" required maxlength="13" pattern="[0-9]{13}">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" required>
              </div>
              <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required pattern="[0-9]{10,15}">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="province">Province</label>
                <select id="province" name="province">
                  <option value="">Select Province</option>
                  <option value="Western Cape">Western Cape</option>
                  <option value="Eastern Cape">Eastern Cape</option>
                  <option value="Northern Cape">Northern Cape</option>
                  <option value="Free State">Free State</option>
                  <option value="KwaZulu-Natal">KwaZulu-Natal</option>
                  <option value="North West">North West</option>
                  <option value="Gauteng">Gauteng</option>
                  <option value="Mpumalanga">Mpumalanga</option>
                  <option value="Limpopo">Limpopo</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Service Information -->
          <div class="form-section">
            <h2><i class="fas fa-cog"></i> Service Information</h2>
            
            <div class="form-group">
              <label for="serviceType">Service Type *</label>
              <select id="serviceType" name="service_type" required>
                <option value="">Select Service Type</option>
                <option value="Service 1A - DRR C and D3 (Still Paying the DC)">Service 1A - DRR C and D3 (Still Paying the DC)</option>
                <option value="Service 1B - DRR C and D3 (No Longer Paying the DC)">Service 1B - DRR C and D3 (No Longer Paying the DC)</option>
                <option value="Service 2 - D4 BELOW 12M">Service 2 - D4 BELOW 12M</option>
                <option value="Service 3 - D4 AITC (4-in-1 Credit Report)">Service 3 - D4 AITC (4-in-1 Credit Report)</option>
                <option value="Service 4 - NL/ITC Credit Bureau Advice">Service 4 - NL/ITC Credit Bureau Advice</option>
                <option value="Service 5 - NL ITC Clearance">Service 5 - NL ITC Clearance</option>
                <option value="Service 6 - RN A Status - NL Removals">Service 6 - RN A Status - NL Removals</option>
                <option value="Service 7 - RN Other Status / NL Removal">Service 7 - RN Other Status / NL Removal</option>
              </select>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="totalAmount">Total Amount *</label>
                <input type="number" id="totalAmount" name="total_amount" required min="0" step="1">
              </div>
              <div class="form-group">
                <label for="monthlyPayment">Monthly Payment *</label>
                <input type="number" id="monthlyPayment" name="monthly_payment" required min="0" step="1">
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="salaryDate">Salary Date</label>
                <input type="text" id="salaryDate" name="salary_date" placeholder="e.g., 25th of each month">
              </div>
              <div class="form-group">
                <label for="trackingDate">Tracking Date</label>
                <input type="text" id="trackingDate" name="tracking_date" placeholder="e.g., 30th of each month">
              </div>
            </div>

            <div class="form-group">
              <label for="status">Status</label>
              <select id="status" name="status">
               <option value="pending_verification">Pending Verification</option>
              <option value="pending" selected>Pending (Awaiting Admin Verification)</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Banking Information -->
        <div class="form-section" style="margin-top: 2rem;">
          <h2><i class="fas fa-university"></i> Banking Information</h2>
          
          <div class="form-row">
            <div class="form-group">
              <label for="bank">Bank Name</label>
              <select id="bank" name="bank">
                <option value="">Select Bank</option>
                <option value="ABSA">ABSA</option>
                <option value="Standard Bank">Standard Bank</option>
                <option value="FNB">FNB</option>
                <option value="Nedbank">Nedbank</option>
                <option value="Capitec">Capitec</option>
                <option value="African Bank">African Bank</option>
                <option value="Investec">Investec</option>
                <option value="Discovery Bank">Discovery Bank</option>
                <option value="TymeBank">TymeBank</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="accountType">Account Type</label>
              <select id="accountType" name="account_type">
                <option value="">Select Account Type</option>
                <option value="Savings">Savings</option>
                <option value="Cheque">Cheque</option>
                <option value="Current">Current</option>
                <option value="Transmission">Transmission</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="accountNumber">Account Number</label>
            <input type="text" id="accountNumber" name="account_number" pattern="[0-9]{8,12}">
          </div>

          <div class="form-group">
            <label for="nupayReference">NuPay Reference</label>
            <input type="text" id="nupayReference" name="nupay_reference" placeholder="Payment reference number">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <i class="fas fa-save"></i> Capture Client
        </button>

        <div id="message"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentAgent = null;

    // Check authentication
    function checkAuth() {
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'agent') { 
          window.location.href = 'staff-login.html'; 
          return false; 
        }
        currentAgent = sess;
        return true;
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
        return false;
      }
    }

    // Initialize page
    if (!checkAuth()) {
      // Redirect will happen in checkAuth
    } else {
      // Pre-fill agent information
      document.getElementById('clientForm').addEventListener('submit', handleSubmit);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const messageDiv = document.getElementById('message');
      
      submitBtn.disabled = true;
      showMessage('Saving client information...', 'info');

      try {
        const formData = new FormData(e.target);
        
        // Validate required fields
        const requiredFields = ['first_name', 'last_name', 'client_id_number', 'email', 'phone', 'service_type', 'total_amount', 'monthly_payment'];
        const missing = requiredFields.filter(field => !formData.get(field));
        
        if (missing.length > 0) {
          throw new Error(`Please fill in all required fields: ${missing.join(', ')}`);
        }

        // Validate ID number
        const idNumber = formData.get('client_id_number');
        if (!/^\d{13}$/.test(idNumber)) {
          throw new Error('ID number must be exactly 13 digits');
        }

        // Validate email
        const email = formData.get('email');
        if (!/\S+@\S+\.\S+/.test(email)) {
          throw new Error('Please enter a valid email address');
        }

        // Validate phone number
        const phone = formData.get('phone');
        if (!/^\d{10,15}$/.test(phone)) {
          throw new Error('Phone number must be 10-15 digits');
        }

        // Check for duplicate ID number
        const { data: existingClient } = await supabase
          .from('edsa_client_database')
          .select('client_id_number')
          .eq('client_id_number', parseInt(idNumber))
          .maybeSingle();

        if (existingClient) {
          throw new Error('A client with this ID number already exists');
        }

        // Generate unique ID and sale reference
        const uniqueId = `client_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        const saleReference = generateSaleReference();
        
        // Prepare client data matching exact database schema
        const clientData = {
          id: uniqueId,
          branch_name: currentAgent.branch,
          agent_name: currentAgent.name,
          sale_date: new Date().toISOString().split('T')[0],
          sale_reference: saleReference,
          client_id_number: parseInt(idNumber),
          first_name: formData.get('first_name'),
          last_name: formData.get('last_name'),
          email: formData.get('email').toLowerCase(),
          phone: parseInt(formData.get('phone')),
          gender: formData.get('gender') || null,
          province: formData.get('province') || null,
          service_type: formData.get('service_type'),
          payment_plan_months: Math.ceil(parseFloat(formData.get('total_amount')) / parseFloat(formData.get('monthly_payment'))),
          bank: formData.get('bank') || null,
          account_type: formData.get('account_type') || null,
          account_number: formData.get('account_number') ? parseInt(formData.get('account_number')) : null,
          salary_date: formData.get('salary_date') || null,
          tracking_date: formData.get('tracking_date') || null,
          nupay_reference: formData.get('nupay_reference') || null,
          total_amount: parseInt(formData.get('total_amount')),
          monthly_payment: parseInt(formData.get('monthly_payment')),
          status: formData.get('status') || 'pending_verification',
          audit_log: [],
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
          total_no_payments_made: "0",
          total_no_missed_payments: "0",
        };

        console.log('Inserting client data:', clientData);

        // Insert into database
        const { data, error } = await supabase
          .from('edsa_client_database')
          .insert(clientData)
          .select()
          .single();

        if (error) {
          console.error('Database error:', error);
          throw new Error(`Database error: ${error.message}`);
        }

        console.log('Client created successfully:', data);

        showMessage(`Client ${clientData.first_name} ${clientData.last_name} captured successfully! Reference: ${clientData.sale_reference}`, 'success');
        
        // Trigger welcome email webhook if client is active
        if (clientData.status === 'active') {
          try {
            await fetch('https://xzjunkpxvfdpuogoflzh.supabase.co/functions/v1/webhook-welcome', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ',
              },
              body: JSON.stringify({
                clientData: data
              })
            });
            console.log('Welcome email webhook triggered');
          } catch (emailError) {
            console.error('Failed to trigger welcome email:', emailError);
          }
        }

        // Reset form
        e.target.reset();

        // Redirect to dashboard after 3 seconds
        setTimeout(() => {
          window.location.href = 'agent-dashboard.html';
        }, 3000);

      } catch (error) {
        console.error('Error capturing client:', error);
        showMessage(error.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    }

    function generateSaleReference() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      const random = Math.floor(1000 + Math.random() * 9000);
      
      return `EDSA-${year}-${month}${day}-${random}`;
    }
    
    function generateSecureServiceToken(clientData) {
      // Create a secure token that expires in 30 days
      const tokenData = {
        ...clientData,
        expires: Date.now() + (30 * 24 * 60 * 60 * 1000) // 30 days
      };
      
      // Base64 encode the token data
      return btoa(JSON.stringify(tokenData));
    }

    function showMessage(message, type) {
      const messageDiv = document.getElementById('message');
      const iconClass = type === 'success' ? 'check-circle' : 
                       type === 'error' ? 'exclamation-circle' : 'info-circle';
      
      messageDiv.innerHTML = `<div class="message ${type}"><i class="fas fa-${iconClass}"></i>${message}</div>`;
    }

    // Auto-calculate payment plan months when amounts change
    document.getElementById('totalAmount').addEventListener('input', calculateMonths);
    document.getElementById('monthlyPayment').addEventListener('input', calculateMonths);

    function calculateMonths() {
      const total = parseFloat(document.getElementById('totalAmount').value) || 0;
      const monthly = parseFloat(document.getElementById('monthlyPayment').value) || 0;
      
      if (total > 0 && monthly > 0) {
        const months = Math.ceil(total / monthly);
        console.log(`Payment plan: ${months} months (${total} / ${monthly})`);
      }
    }
  </script>
</body>
</html>
