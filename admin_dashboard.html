<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #545b62; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #c82333; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .clients-section {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      color: var(--primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    .filter-select {
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      min-width: 150px;
    }

    .clients-table {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: var(--primary);
      position: sticky;
      top: 0;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending_verification { background: rgba(255, 193, 7, 0.2); color: #856404; }
    .status-active { background: rgba(40, 167, 69, 0.2); color: var(--success); }
    .status-completed { background: rgba(23, 162, 184, 0.2); color: var(--info); }
    .status-cancelled { background: rgba(220, 53, 69, 0.2); color: var(--danger); }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--primary);
      font-size: 1.2rem;
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #666;
    }

    /* Client Detail Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 800px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 1rem;
    }

    .modal-title {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--primary);
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: #666;
      padding: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #f0f0f0;
    }

    .client-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .detail-section {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .detail-section h3 {
      color: var(--primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e9ecef;
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-weight: 600;
      color: #495057;
    }

    .detail-value {
      color: #212529;
      text-align: right;
      flex: 1;
      margin-left: 1rem;
      word-break: break-word;
    }

    .status-update-section {
      grid-column: 1 / -1;
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .status-update-section h3 {
      color: #856404;
      margin-bottom: 1rem;
    }

    .status-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .btn-warning:hover {
      background: #e0a800;
    }

    .email-section {
      grid-column: 1 / -1;
      background: #e7f3ff;
      border: 2px solid var(--info);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1rem;
    }

    .email-section h3 {
      color: var(--info);
      margin-bottom: 1rem;
    }

    .email-templates {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .email-template {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .email-template:hover {
      background: #f8f9fa;
      border-color: var(--info);
    }

    .email-template.selected {
      background: #f0f8ff;
      border-color: var(--info);
      border-width: 2px;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .client-row {
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .client-row:hover {
      background-color: #f8f9fa;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .section-header {
        flex-direction: column;
        gap: 1rem;
        align-items: stretch;
      }

      .filters {
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .client-details {
        grid-template-columns: 1fr;
      }

      .email-templates {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Admin Dashboard</h1>
      <div class="header-actions">
        <button class="btn btn-danger" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        <a href="index.html" class="btn btn-secondary">
          <i class="fas fa-home"></i> Homepage
        </a>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalClients">0</div>
        <div class="stat-label">Total Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeClients">0</div>
        <div class="stat-label">Active Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="monthlyClients">0</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalValue">R 0</div>
        <div class="stat-label">Total Value</div>
      </div>
    </div>

    <div class="clients-section">
      <div class="section-header">
        <h2><i class="fas fa-users"></i> Client Database</h2>
        <div style="display: flex; gap: 1rem;">
          <a href="client-capture.html" class="btn btn-primary">
            <i class="fas fa-plus"></i> Add New Client
          </a>
          <a href="csv-upload.html" class="btn btn-success">
            <i class="fas fa-upload"></i> Import CSV
          </a>
        </div>
      </div>

      <div class="filters">
        <input type="text" class="search-box" id="searchBox" placeholder="Search by name, ID, email, or service type...">
        <select class="filter-select" id="branchFilter">
          <option value="">All Branches</option>
        </select>
        <select class="filter-select" id="statusFilter">
          <option value="">All Status</option>
          <option value="pending_verification">Pending Verification</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select class="filter-select" id="serviceFilter">
          <option value="">All Services</option>
          <option value="Service 1A - DRR C and D3 (Still Paying the DC)">Service 1A</option>
          <option value="Service 1B - DRR C and D3 (No Longer Paying the DC)">Service 1B</option>
          <option value="Service 2 - D4 BELOW 12M">Service 2</option>
          <option value="Service 3 - D4 AITC (4-in-1 Credit Report)">Service 3</option>
          <option value="Service 4 - NL/ITC Credit Bureau Advice">Service 4</option>
          <option value="Service 5 - NL ITC Clearance">Service 5</option>
          <option value="Service 6 - RN A Status - NL Removals">Service 6</option>
          <option value="Service 7 - RN Other Status / NL Removal">Service 7</option>
        </select>
      </div>
