<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #545b62; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #c82333; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: #666;
      font-size: 0.9rem;
    }

    .clients-section {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      color: var(--primary);
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    .filter-select {
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      min-width: 150px;
    }

    .clients-table {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: var(--primary);
      position: sticky;
      top: 0;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-pending_verification { background: rgba(255, 193, 7, 0.2); color: #856404; }
    .status-active { background: rgba(40, 167, 69, 0.2); color: var(--success); }
    .status-completed { background: rgba(23, 162, 184, 0.2); color: var(--info); }
    .status-cancelled { background: rgba(220, 53, 69, 0.2); color: var(--danger); }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--primary);
      font-size: 1.2rem;
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #666;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .section-header {
        flex-direction: column;
        gap: 1rem;
        align-items: stretch;
      }

      .filters {
        flex-direction: column;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Admin Dashboard</h1>
      <div class="header-actions">
        <button class="btn btn-danger" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        <a href="index.html" class="btn btn-secondary">
          <i class="fas fa-home"></i> Homepage
        </a>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalClients">0</div>
        <div class="stat-label">Total Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeClients">0</div>
        <div class="stat-label">Active Clients</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="monthlyClients">0</div>
        <div class="stat-label">This Month</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalValue">R 0</div>
        <div class="stat-label">Total Value</div>
      </div>
    </div>

    <div class="clients-section">
      <div class="section-header">
        <h2><i class="fas fa-users"></i> Client Database</h2>
        <a href="client-capture.html" class="btn btn-primary">
          <i class="fas fa-plus"></i> Add New Client
        </a>
      </div>

      <div class="filters">
        <input type="text" class="search-box" id="searchBox" placeholder="Search by name, ID, email, or service type...">
        <select class="filter-select" id="branchFilter">
          <option value="">All Branches</option>
        </select>
        <select class="filter-select" id="statusFilter">
          <option value="">All Status</option>
          <option value="pending_verification">Pending Verification</option>
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select class="filter-select" id="serviceFilter">
          <option value="">All Services</option>
          <option value="Service 1A - DRR C and D3 (Still Paying the DC)">Service 1A</option>
          <option value="Service 1B - DRR C and D3 (No Longer Paying the DC)">Service 1B</option>
          <option value="Service 2 - D4 BELOW 12M">Service 2</option>
          <option value="Service 3 - D4 AITC (4-in-1 Credit Report)">Service 3</option>
          <option value="Service 4 - NL/ITC Credit Bureau Advice">Service 4</option>
          <option value="Service 5 - NL ITC Clearance">Service 5</option>
          <option value="Service 6 - RN A Status - NL Removals">Service 6</option>
          <option value="Service 7 - RN Other Status / NL Removal">Service 7</option>
        </select>
      </div>

      <div id="loadingMessage" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Loading clients...
      </div>

      <div class="clients-table" id="clientsTable" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>Sale Reference</th>
              <th>Client Name</th>
              <th>ID Number</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Service Type</th>
              <th>Branch</th>
              <th>Agent</th>
              <th>Total Amount</th>
              <th>Monthly Payment</th>
              <th>Payments Made</th>
              <th>Status</th>
              <th>Sale Date</th>
            </tr>
          </thead>
          <tbody id="clientsBody">
            <!-- Clients will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let allClients = [];
    let currentUser = null;

    // Check authentication
    function checkAuth() {
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || !['admin', 'admin_manager', 'super'].includes(sess.role)) { 
          window.location.href = 'staff-login.html'; 
          return false; 
        }
        currentUser = sess;
        
        // Update welcome message
        const h1 = document.querySelector('h1');
        if (h1) {
          h1.innerHTML = `<i class="fas fa-users-cog"></i> Welcome ${sess.name}`;
        }
        
        return true;
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
        return false;
      }
    }

    // Initialize page
    if (!checkAuth()) {
      // Redirect will happen in checkAuth
    } else {
      loadClients();
    }

    async function loadClients() {
      try {
        console.log('Loading clients for user:', currentUser);
        
        // Load all clients (admins can see all clients across branches)
        const { data: clients, error } = await supabase
          .from('edsa_client_database')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading clients:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading clients: ' + error.message;
          return;
        }

        console.log('Loaded clients:', clients?.length || 0);
        allClients = clients || [];
        
        updateStats();
        populateBranchFilter();
        displayClients(allClients);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('clientsTable').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred: ' + error.message;
      }
    }

    function updateStats() {
      const total = allClients.length;
      const active = allClients.filter(c => c.status === 'active').length;
      
      // This month's clients
      const currentMonth = new Date().getMonth();
      const currentYear = new Date().getFullYear();
      const monthlyClients = allClients.filter(client => {
        const clientDate = new Date(client.created_at || client.sale_date);
        return clientDate.getMonth() === currentMonth && clientDate.getFullYear() === currentYear;
      }).length;

      // Total value
      const totalValue = allClients.reduce((sum, client) => sum + (parseInt(client.total_amount) || 0), 0);

      document.getElementById('totalClients').textContent = total;
      document.getElementById('activeClients').textContent = active;
      document.getElementById('monthlyClients').textContent = monthlyClients;
      document.getElementById('totalValue').textContent = `R ${totalValue.toLocaleString()}`;
    }

    function populateBranchFilter() {
      const branches = [...new Set(allClients.map(c => c.branch_name).filter(Boolean))];
      const branchFilter = document.getElementById('branchFilter');
      
      branches.forEach(branch => {
        const option = document.createElement('option');
        option.value = branch;
        option.textContent = branch;
        branchFilter.appendChild(option);
      });
    }

    function displayClients(clients) {
      const tbody = document.getElementById('clientsBody');
      
      if (!clients || clients.length === 0) {
        tbody.innerHTML = '<tr><td colspan="13" class="no-data"><i class="fas fa-inbox"></i><br>No clients found</td></tr>';
        return;
      }

      const rows = clients.map(client => {
        const statusClass = `status-${client.status || 'pending_verification'}`;
        const saleDate = client.sale_date || 
                        (client.created_at ? new Date(client.created_at).toLocaleDateString() : 'N/A');
        
        return `
          <tr>
            <td><strong>${client.sale_reference || 'N/A'}</strong></td>
            <td>${client.first_name || ''} ${client.last_name || ''}</td>
            <td>${client.client_id_number || 'N/A'}</td>
            <td>${client.email || 'N/A'}</td>
            <td>${client.phone || 'N/A'}</td>
            <td style="font-size: 0.9em;">${client.service_type || 'N/A'}</td>
            <td>${client.branch_name || 'N/A'}</td>
            <td>${client.agent_name || 'N/A'}</td>
            <td><strong>R ${(parseInt(client.total_amount) || 0).toLocaleString()}</strong></td>
            <td>R ${(parseInt(client.monthly_payment) || 0).toLocaleString()}</td>
            <td>${client.total_no_payments_made || '0'}</td>
            <td><span class="status-badge ${statusClass}">${(client.status || 'pending').replace('_', ' ')}</span></td>
            <td>${saleDate}</td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    // Search and filter functionality
    document.getElementById('searchBox').addEventListener('input', filterClients);
    document.getElementById('branchFilter').addEventListener('change', filterClients);
    document.getElementById('statusFilter').addEventListener('change', filterClients);
    document.getElementById('serviceFilter').addEventListener('change', filterClients);

    function filterClients() {
      const searchTerm = document.getElementById('searchBox').value.toLowerCase();
      const branchFilter = document.getElementById('branchFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const serviceFilter = document.getElementById('serviceFilter').value;

      let filtered = allClients;

      if (searchTerm) {
        filtered = filtered.filter(client =>
          `${client.first_name || ''} ${client.last_name || ''}`.toLowerCase().includes(searchTerm) ||
          (client.client_id_number && client.client_id_number.toString().includes(searchTerm)) ||
          (client.email && client.email.toLowerCase().includes(searchTerm)) ||
          (client.service_type && client.service_type.toLowerCase().includes(searchTerm)) ||
          (client.sale_reference && client.sale_reference.toLowerCase().includes(searchTerm))
        );
      }

      if (branchFilter) {
        filtered = filtered.filter(client => client.branch_name === branchFilter);
      }

      if (statusFilter) {
        filtered = filtered.filter(client => client.status === statusFilter);
      }

      if (serviceFilter) {
        filtered = filtered.filter(client => client.service_type === serviceFilter);
      }

      displayClients(filtered);
    }

    // Logout function
    window.logout = function() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('edsa_staff_session');
        window.location.href = 'staff-login.html';
      }
    };
  </script>
</body>
</html>
