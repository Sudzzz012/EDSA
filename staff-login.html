<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 900px;
      margin: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      height: 60px;
      margin-bottom: 1rem;
    }

    .header h1 {
      color: var(--primary);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #666;
      font-size: 1.1rem;
    }

    .login-tiers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .tier-card {
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .tier-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      transition: all 0.3s ease;
    }

    .tier-card.agent {
      border-color: var(--success);
    }
    .tier-card.agent::before {
      background: var(--success);
    }
    .tier-card.agent:hover {
      background: linear-gradient(135deg, #d4edda, #c3e6cb);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(40, 167, 69, 0.3);
    }

    .tier-card.admin {
      border-color: var(--info);
    }
    .tier-card.admin::before {
      background: var(--info);
    }
    .tier-card.admin:hover {
      background: linear-gradient(135deg, #d1ecf1, #bee5eb);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(23, 162, 184, 0.3);
    }

    .tier-card.admin_manager {
      border-color: var(--warning);
    }
    .tier-card.admin_manager::before {
      background: var(--warning);
    }
    .tier-card.admin_manager:hover {
      background: linear-gradient(135deg, #fff3cd, #ffeaa7);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 193, 7, 0.3);
    }

    .tier-card.super {
      border-color: var(--danger);
    }
    .tier-card.super::before {
      background: var(--danger);
    }
    .tier-card.super:hover {
      background: linear-gradient(135deg, #f8d7da, #f5c6cb);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(220, 53, 69, 0.3);
    }

    .tier-card.selected {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .tier-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .tier-card.agent .tier-icon { color: var(--success); }
    .tier-card.admin .tier-icon { color: var(--info); }
    .tier-card.admin_manager .tier-icon { color: var(--warning); }
    .tier-card.super .tier-icon { color: var(--danger); }

    .tier-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .tier-description {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.4;
    }

    .login-form {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 2rem;
      display: none;
    }

    .login-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(41, 112, 186, 0.1);
    }

    .login-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(41, 112, 186, 0.3);
    }

    .login-btn:disabled {
      background: #6c757d;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .back-link {
      text-align: center;
      margin-top: 2rem;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: var(--primary-dark);
    }

    @media (max-width: 768px) {
      .login-tiers {
        grid-template-columns: 1fr;
      }
      
      .login-container {
        margin: 1rem;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="header">
      <img src="erase-debt-logo.png" alt="Erase Debt SA" class="logo">
      <h1>Staff Login Portal</h1>
      <p>Select your access level to continue</p>
    </div>

    <!-- Login Tier Selection -->
    <div class="login-tiers" id="tierSelection">
      <div class="tier-card agent" data-role="agent">
        <div class="tier-icon">
          <i class="fas fa-user-tie"></i>
        </div>
        <div class="tier-title">Agent / Feeder</div>
        <div class="tier-description">Client capture and basic operations</div>
      </div>

      <div class="tier-card admin" data-role="admin">
        <div class="tier-icon">
          <i class="fas fa-user-cog"></i>
        </div>
        <div class="tier-title">Admin</div>
        <div class="tier-description">Client management and approvals</div>
      </div>

      <div class="tier-card admin_manager" data-role="admin_manager">
        <div class="tier-icon">
          <i class="fas fa-users-cog"></i>
        </div>
        <div class="tier-title">Admin Manager</div>
        <div class="tier-description">Staff oversight and reporting</div>
      </div>

      <div class="tier-card super" data-role="super">
        <div class="tier-icon">
          <i class="fas fa-crown"></i>
        </div>
        <div class="tier-title">Super User</div>
        <div class="tier-description">Full system administration</div>
      </div>
    </div>

    <!-- Login Form -->
    <div class="login-form" id="loginForm">
      <form id="staffLoginForm">
        <div class="form-group">
          <label for="username">Username (ID Number)</label>
          <input type="text" id="username" name="username" required placeholder="Enter your 13-digit ID number" maxlength="13">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          Login as <span id="selectedRoleText">Staff</span>
        </button>

        <div id="loginMessage"></div>
      </form>

      <button class="login-btn" style="background: #6c757d; margin-top: 1rem;" onclick="showTierSelection()">
        <i class="fas fa-arrow-left"></i>
        Back to Role Selection
      </button>
    </div>

    <div class="back-link">
      <a href="index.html">
        <i class="fas fa-home"></i>
        Back to Homepage
      </a>
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <script type="module">
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let selectedRole = null;

    // Role selection handling
    document.querySelectorAll('.tier-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedRole = card.dataset.role;
        
        // Remove selected class from all cards
        document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
        
        // Add selected class to clicked card
        card.classList.add('selected');
        
        // Update form
        document.getElementById('selectedRoleText').textContent = card.querySelector('.tier-title').textContent;
        
        // Show login form
        setTimeout(() => {
          document.getElementById('tierSelection').style.display = 'none';
          document.getElementById('loginForm').classList.add('active');
        }, 300);
      });
    });

    // Show tier selection
    window.showTierSelection = function() {
      document.getElementById('loginForm').classList.remove('active');
      setTimeout(() => {
        document.getElementById('tierSelection').style.display = 'grid';
        document.getElementById('loginForm').style.display = 'none';
      }, 300);
      selectedRole = null;
    };

    // Show message function
    function showMessage(message, type) {
      const messageDiv = document.getElementById('loginMessage');
      messageDiv.innerHTML = `
        <div class="message ${type}">
          <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
          ${message}
        </div>
      `;
    }

    // Login form handling
    document.getElementById('staffLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!selectedRole) {
        showMessage('Please select a role first.', 'error');
        return;
      }

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');

      // Basic validation
      if (!username || username.length !== 13 || !/^\d+$/.test(username)) {
        showMessage('Please enter a valid 13-digit ID number.', 'error');
        return;
      }

      if (!password) {
        showMessage('Please enter your password.', 'error');
        return;
      }

      loginBtn.disabled = true;
      showMessage('Authenticating...', 'success');

      try {
        // Look up user in database
        const { data: user, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id_number', username)
          .eq('role', selectedRole)
          .eq('is_active', true)
          .single();

        if (error || !user) {
          showMessage(`No active ${selectedRole.replace('_', ' ')} account found with this ID number.`, 'error');
          loginBtn.disabled = false;
          return;
        }

        // Verify password
        const passwordMatch = await bcrypt.compare(password, user.password_hash);
        if (!passwordMatch) {
          showMessage('Invalid password. Please try again.', 'error');
          loginBtn.disabled = false;
          return;
        }

        // Create session
        const session = {
          id: user.id,
          username: user.id_number,
          name: user.full_name,
          email: user.email,
          role: user.role,
          branch: user.branch,
          loginTime: new Date().toISOString()
        };

        localStorage.setItem('edsa_staff_session', JSON.stringify(session));

        showMessage('Login successful! Redirecting...', 'success');

        // Redirect based on role
        setTimeout(() => {
          switch (selectedRole) {
            case 'agent':
              window.location.href = 'agent-dashboard.html';
              break;
            case 'admin':
              window.location.href = 'admin-dashboard.html';
              break;
            case 'admin_manager':
              window.location.href = 'admin-manager-dashboard.html';
              break;
            case 'super':
              window.location.href = 'super-dashboard.html';
              break;
            default:
              window.location.href = 'index.html';
          }
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);
        showMessage('An error occurred during login. Please try again.', 'error');
        loginBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
