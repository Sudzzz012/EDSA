<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login | Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <style>
    :root {
      --agent: #28a745;
      --admin: #17a2b8;
      --manager: #ffc107;
      --super: #dc3545;
      --bg: linear-gradient(135deg, #003865, #005c97);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
      width: min(500px, 90vw);
      backdrop-filter: blur(10px);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 1rem;
      box-shadow: 0 8px 25px rgba(41, 112, 186, 0.3);
    }

    .header h1 {
      color: #2970ba;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: #666;
      font-size: 1rem;
    }

    /* Tier Selection */
    .tier-selection {
      display: block;
    }

    .tier-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .tier-card {
      background: white;
      border: 3px solid #e9ecef;
      border-radius: 15px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .tier-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      transition: left 0.5s;
    }

    .tier-card:hover::before {
      left: 100%;
    }

    .tier-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .tier-card.selected {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .tier-card.agent {
      border-color: var(--agent);
    }

    .tier-card.agent.selected {
      background: var(--agent);
      color: white;
    }

    .tier-card.admin {
      border-color: var(--admin);
    }

    .tier-card.admin.selected {
      background: var(--admin);
      color: white;
    }

    .tier-card.manager {
      border-color: var(--manager);
    }

    .tier-card.manager.selected {
      background: var(--manager);
      color: #212529;
    }

    .tier-card.super {
      border-color: var(--super);
    }

    .tier-card.super.selected {
      background: var(--super);
      color: white;
    }

    .tier-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .tier-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .tier-desc {
      font-size: 0.85rem;
      opacity: 0.8;
    }

    /* Login Form */
    .login-form {
      display: none;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2970ba;
      box-shadow: 0 0 0 3px rgba(41, 112, 186, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .back-btn {
      background: #6c757d;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-right: 1rem;
    }

    .back-btn:hover {
      background: #5a6268;
    }

    .forgot-password {
      text-align: center;
      margin-top: 1rem;
    }

    .forgot-password a {
      color: #2970ba;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: #155724;
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: #721c24;
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .home-link {
      text-align: center;
      margin-top: 2rem;
    }

    .home-link a {
      color: #2970ba;
      text-decoration: none;
      font-weight: 600;
    }

    .home-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .tier-grid {
        grid-template-columns: 1fr;
      }
      
      .container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="erase-debt-logo.png" alt="Erase Debt SA" class="logo">
      <h1>Staff Login Portal</h1>
      <p>Select your access tier to continue</p>
    </div>

    <!-- Tier Selection -->
    <div id="tierSelection" class="tier-selection">
      <div class="tier-grid">
        <div class="tier-card agent" data-tier="agent">
          <i class="fas fa-user-tie tier-icon"></i>
          <div class="tier-title">Agent/Feeder</div>
          <div class="tier-desc">Client capture & data entry</div>
        </div>
        
        <div class="tier-card admin" data-tier="admin">
          <i class="fas fa-user-cog tier-icon"></i>
          <div class="tier-title">Admin</div>
          <div class="tier-desc">Client management & workflows</div>
        </div>
        
        <div class="tier-card manager" data-tier="admin_manager">
          <i class="fas fa-users-cog tier-icon"></i>
          <div class="tier-title">Admin Manager</div>
          <div class="tier-desc">Staff oversight & reporting</div>
        </div>
        
        <div class="tier-card super" data-tier="super">
          <i class="fas fa-crown tier-icon"></i>
          <div class="tier-title">Super User</div>
          <div class="tier-desc">Full system administration</div>
        </div>
      </div>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="login-form">
      <form id="staffLoginForm">
        <div class="form-group">
          <label for="idNumber">ID Number</label>
          <input type="text" id="idNumber" name="idNumber" required maxlength="13" placeholder="Enter your 13-digit ID number">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" id="loginBtn" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
        
        <div style="display: flex; align-items: center;">
          <button type="button" id="backBtn" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
          </button>
          <div class="forgot-password" style="flex: 1;">
            <a href="#" id="forgotPasswordLink">Forgot your password?</a>
          </div>
        </div>
        
        <div id="loginMessage"></div>
      </form>
    </div>

    <div class="home-link">
      <a href="index.html"><i class="fas fa-home"></i> Back to Homepage</a>
    </div>
  </div>

  <!-- Load bcrypt and Supabase -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  
  <script type="module">
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentTier = null;

    const tierSelection = document.getElementById('tierSelection');
    const loginForm = document.getElementById('loginForm');
    const staffLoginForm = document.getElementById('staffLoginForm');
    const loginBtn = document.getElementById('loginBtn');
    const backBtn = document.getElementById('backBtn');
    const loginMessage = document.getElementById('loginMessage');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');

    const tierConfig = {
      'agent': { title: 'Agent/Feeder', color: '#28a745' },
      'admin': { title: 'Admin', color: '#17a2b8' },
      'admin_manager': { title: 'Admin Manager', color: '#ffc107' },
      'super': { title: 'Super User', color: '#dc3545' }
    };

    // Tier selection
    document.querySelectorAll('.tier-card').forEach(card => {
      card.addEventListener('click', () => {
        const tier = card.dataset.tier;
        selectTier(tier);
      });
    });

    function selectTier(tier) {
      currentTier = tier;
      
      // Update UI
      document.querySelectorAll('.tier-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-tier="${tier}"]`).classList.add('selected');
      
      // Show login form after animation
      setTimeout(() => {
        tierSelection.style.display = 'none';
        loginForm.style.display = 'block';
        
        // Update form styling based on tier
        const config = tierConfig[tier];
        loginBtn.style.background = config.color;
        loginBtn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Login as ${config.title}`;
        
        document.getElementById('idNumber').focus();
      }, 300);
    }

    // Back button
    backBtn.addEventListener('click', () => {
      loginForm.style.display = 'none';
      tierSelection.style.display = 'block';
      currentTier = null;
      staffLoginForm.reset();
      loginMessage.innerHTML = '';
    });

    // Show message helper
    function showMessage(element, message, type) {
      element.innerHTML = `<div class="message ${type}">
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        ${message}
      </div>`;
    }

    // Login form submission
    staffLoginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!currentTier) {
        showMessage(loginMessage, 'Please select a login tier first.', 'error');
        return;
      }

      const idNumber = document.getElementById('idNumber').value.trim();
      const password = document.getElementById('password').value;

      if (!idNumber || !password) {
        showMessage(loginMessage, 'Please enter both ID number and password.', 'error');
        return;
      }

      loginBtn.disabled = true;
      showMessage(loginMessage, 'Verifying credentials...', 'info');

      try {
        // Look up user
        const { data: users, error } = await supabase
          .from('edsa_users')
          .select('*')
          .eq('id_number', idNumber)
          .eq('role', currentTier)
          .eq('is_active', true)
          .single();

        if (error || !users) {
          // Debug: Let's see what we actually found
          const { data: allUsers } = await supabase
            .from('edsa_users')
            .select('id_number, role, is_active, status')
            .eq('id_number', idNumber);
          
          console.log('Debug - All users with this ID:', allUsers);
          console.log('Debug - Looking for role:', currentTier);
          console.log('Debug - Original error:', error);
          
          if (allUsers && allUsers.length > 0) {
            const user = allUsers[0];
            if (user.role !== currentTier) {
              showMessage(loginMessage, `This ID belongs to a ${user.role} account. Please select the correct login tier.`, 'error');
            } else if (!user.is_active) {
              showMessage(loginMessage, 'This account is disabled. Please contact your administrator.', 'error');
            } else {
              showMessage(loginMessage, 'Account found but login failed. Please check your credentials.', 'error');
            }
          } else {
            showMessage(loginMessage, `No account found with ID number ${idNumber}.`, 'error');
          }
          loginBtn.disabled = false;
          return;
        }

        // Verify password
        const isValidPassword = await bcrypt.compare(password, users.password_hash);
        
        if (!isValidPassword) {
          showMessage(loginMessage, 'Invalid password. Please try again. (If this is your first login, you may need to reset your password)', 'error');
          loginBtn.disabled = false;
          return;
        }

        console.log('Login successful for:', users.full_name);
        
        // Store session
        const session = {
          id: users.id,
          name: users.full_name,
          email: users.email,
          role: users.role,
          branch: users.branch,
          loginTime: new Date().toISOString()
        };
        
        localStorage.setItem('edsa_staff_session', JSON.stringify(session));
        
        showMessage(loginMessage, `Welcome ${users.full_name}! Redirecting...`, 'success');
        
        // Redirect based on role
        setTimeout(() => {
          const dashboards = {
            'agent': 'agent-dashboard.html',
            'admin': 'admin-dashboard.html', 
            'admin_manager': 'admin-manager-dashboard.html',
            'super': 'super-dashboard.html'
          };
          window.location.href = dashboards[users.role] || 'super-dashboard.html';
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);
        showMessage(loginMessage, 'An unexpected error occurred. Please try again.', 'error');
        loginBtn.disabled = false;
      }
    });

    // Forgot password functionality
    forgotPasswordLink.addEventListener('click', async (e) => {
      e.preventDefault();
      
      if (!currentTier) {
        alert('Please select a login tier first.');
        return;
      }

      const idNumber = document.getElementById('idNumber').value.trim();
      const email = prompt('Please enter your email address:');
      
      if (!idNumber || !email) {
        alert('Please enter both your ID number and email address.');
        return;
      }

      try {
        // Verify user exists
        const { data: user, error } = await supabase
          .from('edsa_users')
          .select('id, full_name, email')
          .eq('id_number', idNumber)
          .eq('email', email.toLowerCase())
          .eq('role', currentTier)
          .eq('is_active', true)
          .single();

        if (error || !user) {
          alert('No matching account found with these details.');
          return;
        }

        // Generate reset token
        const resetToken = Math.random().toString(36).substring(2) + Date.now().toString(36);
        const expiresAt = new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(); // 24 hours

        // Store reset token
        const { error: resetError } = await supabase
          .from('password_resets')
          .insert([{
            user_id: user.id,
            reset_token: resetToken,
            expires_at: expiresAt,
            used: false
          }]);

        if (resetError) {
          console.error('Reset token error:', resetError);
          alert('Failed to generate reset link. Please try again.');
          return;
        }

        // Generate reset link
        const resetLink = `${window.location.origin}/set-password.html?user=${encodeURIComponent(idNumber)}&token=${encodeURIComponent(resetToken)}`;
        
        // In production, this would be sent via email
        // For now, show it to the user
        alert(`Password reset link generated:\n\n${resetLink}\n\nIn production, this would be sent to your email address.`);
        
        console.log('Reset link:', resetLink);

      } catch (error) {
        console.error('Forgot password error:', error);
        alert('An error occurred. Please try again.');
      }
    });
  </script>
</body>
</html>
