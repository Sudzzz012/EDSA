<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Your Password | Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    connect-src 'self' https://xzjunkpxvfdpuogoflzh.supabase.co https://*.supabase.co https://*.supabase.in;
    script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    font-src 'self' data:;
  ">

  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#003865,#005c97);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#14243b}
    .card{background:#fff; width:min(520px,94vw); border-radius:16px; box-shadow:0 14px 44px rgba(41,112,186,.28); padding:26px 24px}
    .logo{display:block;margin:0 auto 12px auto; width:110px; border-radius:12px; box-shadow:0 6px 24px rgba(41,112,186,.35);}
    h1{color:#2970ba; text-align:center; margin:6px 0 14px; font-size:1.6rem}
    label{display:block; font-weight:700; margin:12px 0 6px}
    input{width:100%; padding:12px; border-radius:10px; border:1px solid #c7d8ef; font-size:1rem}
    button{width:100%; padding:13px; margin-top:16px; border:none; border-radius:12px; background:#2970ba; color:#fff; font-weight:800; cursor:pointer}
    button:hover{background:#003865}
    .msg{margin-top:12px; font-weight:700; text-align:center; white-space:pre-wrap}
    .ok{color:#1e824c} .err{color:#c70039}
    .footer-link{display:block; text-align:center; margin-top:14px; color:#2970ba; font-weight:700; text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <img src="erase-debt-logo.png" alt="Erase Debt SA" class="logo"/>
    <h1>Set Your Password</h1>
    <div id="precheck" class="msg"></div>

    <form id="pwdForm" style="display:none;" autocomplete="off">
      <label>New Password</label>
      <input id="p1" type="password" required minlength="6" placeholder="Enter a strong password"/>
      <label>Confirm Password</label>
      <input id="p2" type="password" required minlength="6" placeholder="Re-enter password"/>
      <button type="submit">Save Password</button>
      <div id="msg" class="msg"></div>
    </form>

    <a class="footer-link" href="staff-login.html">← Back to Staff Login</a>
  </div>

  <script type="module">
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

    // ----- CONFIG -----
    const SUPABASE_URL = "https://xzjunkpxvfdpuogoflzh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ";

    const qs = new URLSearchParams(location.search);
    const idNumber = (qs.get('user') || '').trim();
    const token = (qs.get('token') || '').trim();

    const pre = document.getElementById('precheck');
    const form = document.getElementById('pwdForm');
    const msg = document.getElementById('msg');

    function say(el, text, cls=''){ el.className = 'msg ' + (cls||''); el.textContent = text; }
    function httpErrorText(res){ return `HTTP ${res.status} ${res.statusText}`; }

    // simple GET wrapper
    async function sbGet(path, query='') {
      const url = `${SUPABASE_URL}${path}${query ? `?${query}` : ''}`;
      return fetch(url, {
        method: 'GET',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
    }
    // simple PATCH wrapper
    async function sbPatch(path, bodyObj) {
      return fetch(`${SUPABASE_URL}${path}`, {
        method: 'PATCH',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          Prefer: 'return=representation'
        },
        body: JSON.stringify(bodyObj)
      });
    }

    // State
    let userRow = null;   // { id, id_number, email, role, ... }
    let resetRow = null;  // { id, user_id, reset_token, expires_at, used }

    // ---- PRECHECK: validate token + user ----
    async function precheck() {
      if(!idNumber || !token){
        say(pre, "Invalid link. Missing user or token.", "err");
        return;
      }
      say(pre, "Validating reset link…");

      // 1) Find user by id_number
      const uRes = await sbGet('/rest/v1/edsa_users', new URLSearchParams({
        select: 'id,id_number,email,role,status,is_active,branch',
        id_number: `eq.${idNumber}`,
        is_active: 'eq.true'
      }));
      if(!uRes.ok){
        say(pre, `Could not look up user. ${httpErrorText(uRes)}`, "err");
        return;
      }
      const users = await uRes.json();
      if(!users.length){
        say(pre, "We could not find an active account for that ID number.", "err");
        return;
      }
      userRow = users[0];

      // 2) Check password_resets entry
      const nowIso = new Date().toISOString();
      const rRes = await sbGet('/rest/v1/password_resets', new URLSearchParams({
        select: 'id,user_id,reset_token,expires_at,used',
        user_id: `eq.${userRow.id}`,
        reset_token: `eq.${token}`,
        used: 'eq.false'
      }));
      if(!rRes.ok){
        say(pre, `Could not validate token. ${httpErrorText(rRes)}`, "err");
        return;
      }
      const tokens = await rRes.json();
      if(!tokens.length){
        say(pre, "This reset link is invalid or already used.", "err");
        return;
      }
      resetRow = tokens[0];
      if(resetRow.expires_at && resetRow.expires_at < nowIso){
        say(pre, "This reset link has expired. Please request a new one.", "err");
        return;
      }

      // OK -> show form
      say(pre, "Link verified. Please set your password below.", "ok");
      form.style.display = 'block';
    }

    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      msg.textContent = '';

      const p1 = document.getElementById('p1').value;
      const p2 = document.getElementById('p2').value;
      if(p1.length < 6){ say(msg, "Password must be at least 6 characters.", "err"); return; }
      if(p1 !== p2){ say(msg, "Passwords do not match.", "err"); return; }

      try {
        say(msg, "Saving your password…");
        const hash = await bcrypt.hash(p1, 10);

        // 1) Update user password
        const uPatch = await sbPatch('/rest/v1/edsa_users?id=eq.'+encodeURIComponent(userRow.id), {
          password_hash: hash
        });
        if(!uPatch.ok){
          say(msg, "Failed to update your password: " + httpErrorText(uPatch), "err");
          return;
        }

        // 2) Mark reset token as used
        const rPatch = await sbPatch('/rest/v1/password_resets?id=eq.'+encodeURIComponent(resetRow.id), {
          used: true
        });
        if(!rPatch.ok){
          say(msg, "Password set, but token cleanup failed. You can still log in.", "err");
          return;
        }

        say(msg, "✅ Password saved. Redirecting to login…", "ok");
        setTimeout(()=> location.href = 'staff-login.html', 1200);
      } catch(err){
        say(msg, "Unexpected error: " + (err?.message || err), "err");
      }
    });

    precheck();
  </script>
</body>
</html>
