<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Staff - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
    }

    .staff-card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .staff-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .staff-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .staff-info h3 {
      margin: 0 0 0.5rem 0;
      color: #2970ba;
      font-size: 1.3rem;
    }

    .staff-info p {
      margin: 0.25rem 0;
      color: #666;
    }

    .role-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .role-agent {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .role-admin {
      background: rgba(23, 162, 184, 0.2);
      color: #17a2b8;
    }

    .role-admin_manager {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .role-super {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
    }

    .status-active {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .status-disabled {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .staff-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }

    .btn-edit {
      background: #17a2b8;
      color: white;
    }

    .btn-edit:hover {
      background: #138496;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-warning {
      background: #ffc107;
      color: #212529;
    }

    .btn-warning:hover {
      background: #e0a800;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .password-hash {
      font-family: monospace;
      font-size: 0.7rem;
      color: #666;
      background: #f8f9fa;
      padding: 0.5rem;
      border-radius: 4px;
      margin-top: 0.5rem;
      word-break: break-all;
      max-height: 60px;
      overflow-y: auto;
    }

    .super-only {
      display: none;
    }

    @media (max-width: 768px) {
      .staff-grid {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .header-actions {
        flex-direction: column;
        width: 100%;
      }

      .staff-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Staff Management</h1>
      <div class="header-actions">
        <a href="register-user.html" class="btn btn-primary">
          <i class="fas fa-user-plus"></i> Add New Staff
        </a>
        <a href="super-dashboard.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading staff members...
    </div>

    <div id="staffGrid" class="staff-grid" style="display: none;">
      <!-- Staff cards will be loaded here -->
    </div>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let currentUserRole = null;

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || (sess.role !== 'super' && sess.role !== 'admin_manager')) { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
        currentUserRole = sess.role;
        
        // Show super user only features
        if (sess.role === 'super') {
          document.querySelectorAll('.super-only').forEach(el => {
            el.style.display = 'block';
          });
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    async function loadStaff() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading staff:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading staff members.';
          return;
        }

        const staffGrid = document.getElementById('staffGrid');
        const loadingMessage = document.getElementById('loadingMessage');

        if (!staff || staff.length === 0) {
          loadingMessage.innerHTML = '<i class="fas fa-users"></i> No staff members found.';
          return;
        }

        // Generate staff cards
        const staffCards = staff.map(member => {
          const roleClass = `role-${member.role}`;
          const statusClass = `status-${member.status || 'active'}`;
          
          return `
            <div class="staff-card">
              <div class="staff-header">
                <div class="staff-info">
                  <h3>${member.full_name || 'Unknown'}</h3>
                  <p><i class="fas fa-envelope"></i> ${member.email || 'No email'}</p>
                  <p><i class="fas fa-id-card"></i> ${member.id_number || 'No ID'}</p>
                  <p><i class="fas fa-building"></i> ${member.branch || 'No branch'}</p>
                  <div class="role-badge ${roleClass}">${member.role || 'No role'}</div>
                  <div class="status-badge ${statusClass}">${member.status || 'active'}</div>
                </div>
              </div>
              
              ${currentUserRole === 'super' ? `
                <div class="password-hash super-only">
                  <strong>Password Hash:</strong><br>
                  ${member.password_hash ? member.password_hash.substring(0, 60) + '...' : 'No password set'}
                </div>
              ` : ''}
              
              <div class="staff-actions">
                <button class="btn btn-edit btn-sm" onclick="editStaff('${member.id}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
                ${currentUserRole === 'super' ? `
                  <button class="btn btn-warning btn-sm super-only" onclick="generateTempPassword('${member.id}', '${member.full_name}')">
                    <i class="fas fa-key"></i> Temp Password
                  </button>
                  <button class="btn btn-danger btn-sm super-only" onclick="toggleStatus('${member.id}', '${member.status}', '${member.full_name}')">
                    <i class="fas fa-${member.status === 'active' ? 'ban' : 'check'}"></i> 
                    ${member.status === 'active' ? 'Disable' : 'Enable'}
                  </button>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');

        staffGrid.innerHTML = staffCards;
        loadingMessage.style.display = 'none';
        staffGrid.style.display = 'grid';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred.';
      }
    }

    // Edit staff function
    window.editStaff = function(staffId) {
      window.location.href = `edit-staff.html?id=${staffId}`;
    };

    // Generate temporary password (Super users only)
    window.generateTempPassword = async function(id, name) {
      if (currentUserRole !== 'super') {
        alert('Only super users can generate temporary passwords.');
        return;
      }

      if (!confirm(`Generate a new temporary password for ${name}?`)) {
        return;
      }

      try {
        // Generate a simple temporary password
        const tempPassword = 'Temp' + Math.floor(1000 + Math.random() * 9000) + '!';
        const password_hash = await bcrypt.hash(tempPassword, 10);

        const { error } = await supabase
          .from('edsa_users')
          .update({ password_hash })
          .eq('id', id);

        if (error) {
          alert('Error generating password: ' + error.message);
          return;
        }

        alert(`Temporary password generated for ${name}:\n\nPassword: ${tempPassword}\n\nPlease share this securely with the user.`);
        loadStaff(); // Reload to show updated hash
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    // Toggle status (Super users only)
    window.toggleStatus = async function(id, currentStatus, name) {
      if (currentUserRole !== 'super') {
        alert('Only super users can change user status.');
        return;
      }

      const newStatus = currentStatus === 'active' ? 'disabled' : 'active';
      const action = newStatus === 'active' ? 'enable' : 'disable';

      if (!confirm(`Are you sure you want to ${action} ${name}?`)) {
        return;
      }

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update({ 
            status: newStatus,
            is_active: newStatus === 'active'
          })
          .eq('id', id);

        if (error) {
          alert('Error updating status: ' + error.message);
          return;
        }

        alert(`${name} has been ${action}d successfully.`);
        loadStaff(); // Reload to show updated status
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    // Load staff on page load
    loadStaff();
  </script>
</body>
</html>
