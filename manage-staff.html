<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Management - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-actions {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .btn-warning {
      background: #ffc107;
      color: #212529;
    }

    .btn-warning:hover {
      background: #e0a800;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
    }

    .filters {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .filters h3 {
      margin: 0 0 1rem 0;
      color: #2970ba;
    }

    .filter-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      align-items: end;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
    }

    .filter-group label {
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .filter-group input,
    .filter-group select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }

    .staff-table {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #2970ba;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: #f8f9fa;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .status-disabled {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .role-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-super {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .role-admin_manager {
      background: rgba(255, 193, 7, 0.2);
      color: #856404;
    }

    .role-admin {
      background: rgba(23, 162, 184, 0.2);
      color: #0c5460;
    }

    .role-agent {
      background: rgba(40, 167, 69, 0.2);
      color: #155724;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #666;
      font-size: 1.1rem;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .header-actions {
        flex-direction: column;
        width: 100%;
      }

      .filter-row {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Staff Management</h1>
      <div class="header-actions">
        <a href="register-user.html" class="btn btn-success">
          <i class="fas fa-user-plus"></i> Add New Staff
        </a>
        <a href="super-dashboard.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="filters">
      <h3><i class="fas fa-filter"></i> Filters</h3>
      <div class="filter-row">
        <div class="filter-group">
          <label for="searchName">Search Name</label>
          <input type="text" id="searchName" placeholder="Enter name...">
        </div>
        <div class="filter-group">
          <label for="filterRole">Role</label>
          <select id="filterRole">
            <option value="">All Roles</option>
            <option value="super">Super User</option>
            <option value="admin_manager">Admin Manager</option>
            <option value="admin">Admin</option>
            <option value="agent">Agent</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="filterBranch">Branch</label>
          <select id="filterBranch">
            <option value="">All Branches</option>
          </select>
        </div>
        <div class="filter-group">
          <button class="btn btn-primary" onclick="applyFilters()">
            <i class="fas fa-search"></i> Apply Filters
          </button>
        </div>
      </div>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading staff members...
    </div>

    <div class="staff-table" id="staffTable" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>ID Number</th>
            <th>Role</th>
            <th>Branch</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="staffTableBody">
          <!-- Staff data will be loaded here -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let allStaff = [];

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'super') { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    // Load staff members
    async function loadStaff() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          console.error('Error loading staff:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading staff members.';
          return;
        }

        allStaff = staff || [];
        populateBranchFilter();
        displayStaff(allStaff);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('staffTable').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred.';
      }
    }

    // Populate branch filter
    function populateBranchFilter() {
      const branches = [...new Set(allStaff.map(s => s.branch).filter(Boolean))].sort();
      const branchSelect = document.getElementById('filterBranch');
      
      branches.forEach(branch => {
        const option = document.createElement('option');
        option.value = branch;
        option.textContent = branch;
        branchSelect.appendChild(option);
      });
    }

    // Display staff in table
    function displayStaff(staff) {
      const tbody = document.getElementById('staffTableBody');
      
      if (!staff || staff.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="no-data">No staff members found</td></tr>';
        return;
      }

      const rows = staff.map(member => {
        const statusClass = member.is_active ? 'status-active' : 'status-disabled';
        const statusText = member.is_active ? 'Active' : 'Disabled';
        const roleClass = `role-${member.role}`;
        const roleText = member.role ? member.role.replace('_', ' ').toUpperCase() : 'N/A';
        const createdDate = member.created_at ? new Date(member.created_at).toLocaleDateString() : 'N/A';
        
        return `
          <tr>
            <td>${member.full_name || 'N/A'}</td>
            <td>${member.email || 'N/A'}</td>
            <td>${member.id_number || 'N/A'}</td>
            <td><span class="role-badge ${roleClass}">${roleText}</span></td>
            <td>${member.branch || 'N/A'}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>${createdDate}</td>
            <td>
              <div class="actions">
                <a href="edit-staff.html?id=${member.id}" class="btn btn-primary btn-sm">
                  <i class="fas fa-edit"></i> Edit
                </a>
                <button class="btn ${member.is_active ? 'btn-warning' : 'btn-success'} btn-sm" onclick="toggleStatus('${member.id}', ${member.is_active})">
                  <i class="fas fa-${member.is_active ? 'pause' : 'play'}"></i> ${member.is_active ? 'Disable' : 'Enable'}
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    // Apply filters
    window.applyFilters = function() {
      const searchName = document.getElementById('searchName').value.toLowerCase();
      const filterRole = document.getElementById('filterRole').value;
      const filterStatus = document.getElementById('filterStatus').value;
      const filterBranch = document.getElementById('filterBranch').value;

      let filtered = allStaff;

      if (searchName) {
        filtered = filtered.filter(s => 
          (s.full_name || '').toLowerCase().includes(searchName) ||
          (s.email || '').toLowerCase().includes(searchName)
        );
      }

      if (filterRole) {
        filtered = filtered.filter(s => s.role === filterRole);
      }

      if (filterStatus) {
        const isActive = filterStatus === 'active';
        filtered = filtered.filter(s => s.is_active === isActive);
      }

      if (filterBranch) {
        filtered = filtered.filter(s => s.branch === filterBranch);
      }

      displayStaff(filtered);
    };

    // Toggle staff status
    window.toggleStatus = async function(staffId, currentStatus) {
      const action = currentStatus ? 'disable' : 'enable';
      if (!confirm(`Are you sure you want to ${action} this staff member?`)) {
        return;
      }

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update({ 
            is_active: !currentStatus,
            status: !currentStatus ? 'active' : 'disabled'
          })
          .eq('id', staffId);

        if (error) {
          alert('Error updating staff status: ' + error.message);
          return;
        }

        alert(`Staff member ${action}d successfully!`);
        loadStaff(); // Reload the list

      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    // Add event listeners for real-time filtering
    document.getElementById('searchName').addEventListener('input', applyFilters);
    document.getElementById('filterRole').addEventListener('change', applyFilters);
    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('filterBranch').addEventListener('change', applyFilters);

    // Load staff on page load
    loadStaff();
  </script>
</body>
</html>
