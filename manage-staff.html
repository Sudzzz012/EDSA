<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Management - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --primary: #2970ba;
      --primary-dark: #003865;
      --secondary: #005c97;
      --success: #28a745;
      --warning: #ffc107;
      --danger: #dc3545;
      --info: #17a2b8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #545b62; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #218838; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-warning:hover { background: #e0a800; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #c82333; }
    .btn-sm { padding: 0.5rem 1rem; font-size: 0.9rem; }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 300px;
      padding: 0.75rem 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
    }

    .search-box::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 2rem;
    }

    .staff-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s;
      position: relative;
    }

    .staff-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }

    .staff-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .staff-name {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
      margin: 0;
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(40, 167, 69, 0.2);
      color: var(--success);
    }

    .status-disabled {
      background: rgba(220, 53, 69, 0.2);
      color: var(--danger);
    }

    .staff-info {
      margin-bottom: 1.5rem;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .info-label {
      font-weight: 600;
      color: #666;
    }

    .info-value {
      color: #333;
      text-align: right;
      flex: 1;
      margin-left: 1rem;
      word-break: break-word;
    }

    .staff-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .message {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message.success {
      background: rgba(40, 167, 69, 0.1);
      color: var(--success);
      border: 1px solid rgba(40, 167, 69, 0.2);
    }

    .message.error {
      background: rgba(220, 53, 69, 0.1);
      color: var(--danger);
      border: 1px solid rgba(220, 53, 69, 0.2);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: white;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .controls {
        flex-direction: column;
      }

      .staff-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Staff Management</h1>
      <a href="super-dashboard.html" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </a>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalStaff">0</div>
        <div class="stat-label">Total Staff</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeStaff">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="disabledStaff">0</div>
        <div class="stat-label">Disabled</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="agentCount">0</div>
        <div class="stat-label">Agents</div>
      </div>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search staff by name, email, ID, or branch...">
      <a href="register-user.html" class="btn btn-success">
        <i class="fas fa-plus"></i> Add New Staff
      </a>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading staff members...
    </div>

    <div id="staffGrid" class="staff-grid" style="display: none;"></div>
  </div>

  <!-- Edit Staff Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Edit Staff Member</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <form id="editForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editEmail" required>
        </div>
        <div class="form-group">
          <label>ID Number</label>
          <input type="text" id="editIdNumber" required>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="editRole" required>
            <option value="agent">Agent</option>
            <option value="admin">Admin</option>
            <option value="admin_manager">Admin Manager</option>
            <option value="super">Super User</option>
          </select>
        </div>
        <div class="form-group">
          <label>Branch</label>
          <select id="editBranch" required>
            <option value="Erase Debt SA - ADMIN">Erase Debt SA - ADMIN</option>
            <option value="Erase Debt SA - MP">Erase Debt SA - MP</option>
            <option value="Erase Debt SA - SS">Erase Debt SA - SS</option>
            <option value="Clean Slate Solutions - MSJ">Clean Slate Solutions - MSJ</option>
            <option value="Clean Slate Solutions - RSJ">Clean Slate Solutions - RSJ</option>
            <option value="Boost My Credit Score">Boost My Credit Score</option>
            <option value="Fix My Credit Score">Fix My Credit Score</option>
            <option value="Credit Boost SA">Credit Boost SA</option>
            <option value="Credit Renew SA">Credit Renew SA</option>
            <option value="National Credit Solutions">National Credit Solutions</option>
            <option value="Get Credit SA">Get Credit SA</option>
            <option value="Shield Credit Solutions">Shield Credit Solutions</option>
            <option value="SAZZ Debt Solutions">SAZZ Debt Solutions</option>
            <option value="Clean Credit Consultants">Clean Credit Consultants</option>
            <option value="SA Blacklisting Busters">SA Blacklisting Busters</option>
            <option value="Increase My Credit Score">Increase My Credit Score</option>
            <option value="South African Credit Score Experts - AA">South African Credit Score Experts - AA</option>
            <option value="South African Credit Score Experts - QAA">South African Credit Score Experts - QAA</option>
            <option value="Credifix SA">Credifix SA</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="editStatus" required>
            <option value="active">Active</option>
            <option value="disabled">Disabled</option>
          </select>
        </div>
        <div style="display: flex; gap: 1rem; justify-content: flex-end;">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
        <div id="editMessage"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let allStaff = [];
    let currentEditId = null;

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'super') { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    // Load all staff
    async function loadStaff() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .order('full_name');

        if (error) throw error;

        allStaff = staff || [];
        updateStats();
        displayStaff(allStaff);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('staffGrid').style.display = 'grid';

      } catch (error) {
        console.error('Error loading staff:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading staff members.';
      }
    }

    // Update statistics
    function updateStats() {
      const total = allStaff.length;
      const active = allStaff.filter(s => s.is_active).length;
      const disabled = total - active;
      const agents = allStaff.filter(s => s.role === 'agent').length;

      document.getElementById('totalStaff').textContent = total;
      document.getElementById('activeStaff').textContent = active;
      document.getElementById('disabledStaff').textContent = disabled;
      document.getElementById('agentCount').textContent = agents;
    }

    // Display staff members
    function displayStaff(staff) {
      const grid = document.getElementById('staffGrid');
      
      if (!staff || staff.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: white; padding: 2rem;">No staff members found.</div>';
        return;
      }

      const cards = staff.map(member => `
        <div class="staff-card">
          <div class="staff-header">
            <h3 class="staff-name">${member.full_name}</h3>
            <span class="status-badge status-${member.is_active ? 'active' : 'disabled'}">
              ${member.is_active ? 'Active' : 'Disabled'}
            </span>
          </div>
          <div class="staff-info">
            <div class="info-item">
              <span class="info-label">ID Number:</span>
              <span class="info-value">${member.id_number}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Email:</span>
              <span class="info-value">${member.email}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Role:</span>
              <span class="info-value">${member.role}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Branch:</span>
              <span class="info-value">${member.branch}</span>
            </div>
            <div class="info-item">
              <span class="info-label">Created:</span>
              <span class="info-value">${new Date(member.created_at).toLocaleDateString()}</span>
            </div>
          </div>
          <div class="staff-actions">
            <button class="btn btn-primary btn-sm" onclick="editStaff('${member.id}')">
              <i class="fas fa-edit"></i> Edit
            </button>
            <button class="btn ${member.is_active ? 'btn-warning' : 'btn-success'} btn-sm" onclick="toggleStatus('${member.id}', ${member.is_active})">
              <i class="fas fa-${member.is_active ? 'ban' : 'check'}"></i> ${member.is_active ? 'Disable' : 'Enable'}
            </button>
            <button class="btn btn-info btn-sm" onclick="resetPassword('${member.id}')">
              <i class="fas fa-key"></i> Reset Password
            </button>
          </div>
        </div>
      `).join('');

      grid.innerHTML = cards;
    }

    // Search functionality
    document.getElementById('searchBox').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();
      const filtered = allStaff.filter(staff => 
        staff.full_name.toLowerCase().includes(searchTerm) ||
        staff.email.toLowerCase().includes(searchTerm) ||
        staff.id_number.includes(searchTerm) ||
        staff.branch.toLowerCase().includes(searchTerm) ||
        staff.role.toLowerCase().includes(searchTerm)
      );
      displayStaff(filtered);
    });

    // Edit staff member
    window.editStaff = function(staffId) {
      const staff = allStaff.find(s => s.id === staffId);
      if (!staff) return;

      currentEditId = staffId;
      document.getElementById('editName').value = staff.full_name;
      document.getElementById('editEmail').value = staff.email;
      document.getElementById('editIdNumber').value = staff.id_number;
      document.getElementById('editRole').value = staff.role;
      document.getElementById('editBranch').value = staff.branch;
      document.getElementById('editStatus').value = staff.is_active ? 'active' : 'disabled';
      
      document.getElementById('editModal').classList.add('show');
    };

    // Toggle staff status
    window.toggleStatus = async function(staffId, currentStatus) {
      if (!confirm(`Are you sure you want to ${currentStatus ? 'disable' : 'enable'} this staff member?`)) return;

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update({ 
            is_active: !currentStatus,
            status: !currentStatus ? 'active' : 'disabled'
          })
          .eq('id', staffId);

        if (error) throw error;

        await loadStaff(); // Reload data
        showMessage(document.body, `Staff member ${currentStatus ? 'disabled' : 'enabled'} successfully.`, 'success');
      } catch (error) {
        console.error('Error updating status:', error);
        showMessage(document.body, 'Error updating staff status.', 'error');
      }
    };

    // Reset password
    window.resetPassword = async function(staffId) {
      const staff = allStaff.find(s => s.id === staffId);
      if (!staff) return;

      if (!confirm(`Send password reset email to ${staff.full_name} (${staff.email})?`)) return;

      try {
        // In production, you would call your password reset function here
        // For now, we'll show a success message
        showMessage(document.body, `Password reset email sent to ${staff.email}.`, 'success');
      } catch (error) {
        console.error('Error sending reset:', error);
        showMessage(document.body, 'Error sending password reset email.', 'error');
      }
    };

    // Handle edit form submission
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        full_name: document.getElementById('editName').value.trim(),
        email: document.getElementById('editEmail').value.trim().toLowerCase(),
        id_number: document.getElementById('editIdNumber').value.trim(),
        role: document.getElementById('editRole').value,
        branch: document.getElementById('editBranch').value,
        is_active: document.getElementById('editStatus').value === 'active',
        status: document.getElementById('editStatus').value
      };

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update(formData)
          .eq('id', currentEditId);

        if (error) throw error;

        closeModal();
        await loadStaff(); // Reload data
        showMessage(document.body, 'Staff member updated successfully!', 'success');
      } catch (error) {
        console.error('Error updating staff:', error);
        showMessage(document.getElementById('editMessage'), 'Error updating staff member.', 'error');
      }
    });

    // Close modal
    window.closeModal = function() {
      document.getElementById('editModal').classList.remove('show');
      document.getElementById('editForm').reset();
      document.getElementById('editMessage').innerHTML = '';
      currentEditId = null;
    };

    // Show message function
    function showMessage(element, message, type) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      messageDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>${message}`;
      
      if (element === document.body) {
        element.appendChild(messageDiv);
        setTimeout(() => {
          messageDiv.remove();
        }, 5000);
      } else {
        element.innerHTML = messageDiv.outerHTML;
      }
    }

    // Load staff on page load
    loadStaff();
  </script>
</body>
</html>
