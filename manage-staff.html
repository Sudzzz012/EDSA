<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Management - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: white;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
    }
    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }
    .back-btn {
      background: #2970ba;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .staff-card {
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 20px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="super-dashboard.html" class="back-btn">← Back to Dashboard</a>
    <h1>Staff Management</h1>
    <div id="content">
      <div class="loading">Loading staff members...</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    // Check authentication
    const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
    if (!sess) { 
      window.location.href = 'staff-login.html'; 
    }

    async function loadStaff() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .order('full_name');

        if (error) throw error;

        const content = document.getElementById('content');
        if (!staff || staff.length === 0) {
          content.innerHTML = '<div class="loading">No staff members found.</div>';
          return;
        }

        const staffHtml = staff.map(member => `
          <div class="staff-card">
            <h3>${member.full_name}</h3>
            <p><strong>ID:</strong> ${member.id_number}</p>
            <p><strong>Email:</strong> ${member.email}</p>
            <p><strong>Role:</strong> ${member.role}</p>
            <p><strong>Branch:</strong> ${member.branch}</p>
            <p><strong>Status:</strong> ${member.is_active ? 'Active' : 'Inactive'}</p>
          </div>
        `).join('');

        content.innerHTML = `<div class="staff-grid">${staffHtml}</div>`;

      } catch (error) {
        document.getElementById('content').innerHTML = `<div class="loading">Error loading staff: ${error.message}</div>`;
      }
    }

    loadStaff();
  </script>
</body>
</html>
