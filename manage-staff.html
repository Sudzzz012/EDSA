<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Staff - Erase Debt SA</title>
  <link rel="icon" href="erase-debt-logo.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      margin: 0;
      padding: 20px;
      color: #333;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .btn-primary {
      background: #2970ba;
      color: white;
    }

    .btn-primary:hover {
      background: #003865;
    }

    .btn-secondary {
      background: #6c757d;
      color: white;
    }

    .btn-secondary:hover {
      background: #545b62;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .btn-sm {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }

    .staff-table {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f8f9fa;
      font-weight: 600;
      color: #2970ba;
    }

    .role-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .role-agent {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
    }

    .role-admin {
      background: rgba(23, 162, 184, 0.2);
      color: #17a2b8;
    }

    .role-admin_manager {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }

    .role-super {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
    }

    .status-active {
      color: #28a745;
      font-weight: 600;
    }

    .status-disabled {
      color: #dc3545;
      font-weight: 600;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: white;
      font-size: 1.2rem;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: white;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .filters {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-users-cog"></i> Staff Management</h1>
      <div>
        <a href="register-user.html" class="btn btn-success">
          <i class="fas fa-user-plus"></i> Add New Staff
        </a>
        <a href="super-dashboard.html" class="btn btn-secondary">
          <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>

    <div class="filters">
      <select class="filter-select" id="roleFilter">
        <option value="">All Roles</option>
        <option value="agent">Agent</option>
        <option value="admin">Admin</option>
        <option value="admin_manager">Admin Manager</option>
        <option value="super">Super User</option>
      </select>
      <select class="filter-select" id="statusFilter">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="disabled">Disabled</option>
      </select>
      <select class="filter-select" id="branchFilter">
        <option value="">All Branches</option>
      </select>
    </div>

    <div id="loadingMessage" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading staff members...
    </div>

    <div class="staff-table" id="staffTable" style="display: none;">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>ID Number</th>
            <th>Email</th>
            <th>Role</th>
            <th>Branch</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="staffBody">
          <!-- Staff will be loaded here -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      "https://xzjunkpxvfdpuogoflzh.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ"
    );

    let allStaff = [];

    // Check authentication
    (function(){
      try {
        const sess = JSON.parse(localStorage.getItem('edsa_staff_session') || 'null');
        if (!sess || sess.role !== 'super') { 
          window.location.href = 'staff-login.html'; 
          return; 
        }
      } catch(e) {
        console.error(e);
        window.location.href = 'staff-login.html';
      }
    })();

    async function loadStaff() {
      try {
        const { data: staff, error } = await supabase
          .from('edsa_users')
          .select('*')
          .order('full_name', { ascending: true });

        if (error) {
          console.error('Error loading staff:', error);
          document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error loading staff members.';
          return;
        }

        allStaff = staff || [];
        populateBranchFilter();
        displayStaff(allStaff);

        document.getElementById('loadingMessage').style.display = 'none';
        document.getElementById('staffTable').style.display = 'block';

      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingMessage').innerHTML = '<i class="fas fa-exclamation-triangle"></i> An unexpected error occurred.';
      }
    }

    function populateBranchFilter() {
      const branches = [...new Set(allStaff.map(s => s.branch).filter(Boolean))];
      const branchFilter = document.getElementById('branchFilter');
      
      branches.forEach(branch => {
        const option = document.createElement('option');
        option.value = branch;
        option.textContent = branch;
        branchFilter.appendChild(option);
      });
    }

    function displayStaff(staff) {
      const tbody = document.getElementById('staffBody');
      
      if (!staff || staff.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #666;">No staff members found</td></tr>';
        return;
      }

      const rows = staff.map(member => {
        const roleClass = `role-${member.role || 'agent'}`;
        const statusClass = member.is_active ? 'status-active' : 'status-disabled';
        const statusText = member.is_active ? 'Active' : 'Disabled';
        
        return `
          <tr>
            <td>${member.full_name || 'N/A'}</td>
            <td>${member.id_number || 'N/A'}</td>
            <td>${member.email || 'N/A'}</td>
            <td><span class="role-badge ${roleClass}">${member.role || 'agent'}</span></td>
            <td>${member.branch || 'N/A'}</td>
            <td><span class="${statusClass}">${statusText}</span></td>
            <td>
              <div class="actions">
                <button class="btn btn-primary btn-sm" onclick="editStaff('${member.id}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn btn-danger btn-sm" onclick="toggleStaffStatus('${member.id}', ${member.is_active})">
                  <i class="fas fa-${member.is_active ? 'ban' : 'check'}"></i> ${member.is_active ? 'Disable' : 'Enable'}
                </button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      tbody.innerHTML = rows;
    }

    // Filter functionality
    document.getElementById('roleFilter').addEventListener('change', filterStaff);
    document.getElementById('statusFilter').addEventListener('change', filterStaff);
    document.getElementById('branchFilter').addEventListener('change', filterStaff);

    function filterStaff() {
      const roleFilter = document.getElementById('roleFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const branchFilter = document.getElementById('branchFilter').value;

      let filtered = allStaff;

      if (roleFilter) {
        filtered = filtered.filter(s => s.role === roleFilter);
      }

      if (statusFilter) {
        const isActive = statusFilter === 'active';
        filtered = filtered.filter(s => s.is_active === isActive);
      }

      if (branchFilter) {
        filtered = filtered.filter(s => s.branch === branchFilter);
      }

      displayStaff(filtered);
    }

    // Staff actions
    window.editStaff = function(staffId) {
      // For now, just show an alert. You can implement a proper edit modal later
      alert(`Edit functionality for staff ID: ${staffId} - This would open an edit form.`);
    };

    window.toggleStaffStatus = async function(staffId, currentStatus) {
      const action = currentStatus ? 'disable' : 'enable';
      
      if (!confirm(`Are you sure you want to ${action} this staff member?`)) {
        return;
      }

      try {
        const { error } = await supabase
          .from('edsa_users')
          .update({ 
            is_active: !currentStatus,
            status: !currentStatus ? 'active' : 'disabled'
          })
          .eq('id', staffId);

        if (error) {
          alert('Error updating staff status: ' + error.message);
          return;
        }

        alert(`Staff member ${action}d successfully!`);
        loadStaff(); // Reload staff list
      } catch (error) {
        alert('Error: ' + error.message);
      }
    };

    // Load staff on page load
    loadStaff();
  </script>
</body>
</html>
