<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit a Query - Erase Debt SA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #003865, #005c97);
      color: #fff;
      padding: 2rem;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      color: #333;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 0.5rem;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.8rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }
    button {
      background-color: #005c97;
      color: #fff;
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background-color: #004070;
    }
    .back-link {
      text-align: center;
      margin-top: 2rem;
    }
    .banner {
      display: block;
      max-width: 100%;
      margin-bottom: 1.5rem;
      border-radius: 6px;
    }
    .success, .error {
      padding: 1rem;
      border-radius: 5px;
      margin-bottom: 1.5rem;
      font-weight: bold;
      display: none;
    }
    .success {
      background: #d1ffd6;
      color: #256029;
    }
    .error {
      background: #ffd6d6;
      color: #a10000;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="submit-query-banner.png" alt="Submit a Query Banner" class="banner">
    <h1>Submit a Query</h1>
    <div id="message-success" class="success"></div>
    <div id="message-error" class="error"></div>
    <form id="queryForm" enctype="multipart/form-data" autocomplete="off">
      <div class="form-group">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" required>
      </div>
      <div class="form-group">
        <label for="id_number">ID Number</label>
        <input type="text" id="id_number" name="id_number" required>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="query_type">Query Type</label>
        <select id="query_type" name="query_type" required>
          <option value="">-- Select a Query --</option>
          <option>I Need a Callback</option>
          <option>I Have a Complaint</option>
          <option>I Have Fully Paid My Fees</option>
          <option>I Have Submitted Documents And Am Awaiting a Reply</option>
          <option>I Want to Pay My Outstanding Funds</option>
          <option>I Want To Settle My Arrears</option>
          <option>I Need A Follow Up On My Process</option>
          <option>I Did Not Get a Welcome Email</option>
        </select>
      </div>
      <div class="form-group">
        <label for="additional_text">Additional Information</label>
        <textarea id="additional_text" name="additional_text" rows="4" placeholder="Type any important information for the admin department here..."></textarea>
      </div>
      <div class="form-group">
        <label for="attachment">Upload Attachment (optional)</label>
        <input type="file" id="attachment" name="attachment" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
      </div>
      <input type="hidden" id="branch_name" name="branch_name" value="Erase Debt SA - MP">
      <div style="text-align: center;">
        <button type="submit">Submit</button>
      </div>
    </form>
    <div class="back-link">
      <a href="index.html" style="color: #005c97; text-decoration: none;">← Return to Home</a>
    </div>
  </div>

  <!-- Supabase insertion script -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // SET THESE TO YOUR PROJECT VALUES
    const SUPABASE_URL = 'https://xzjunkpxvfdpuogoflzh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6anVua3B4dmZkcHVvZ29mbHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDkxNjMwNzksImV4cCI6MjA2NDczOTA3OX0.bRMANK5hzAKnuFXylVfhtzuU18CsjeJ4wa1UWHvSPNQ';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('queryForm');
    const successBox = document.getElementById('message-success');
    const errorBox = document.getElementById('message-error');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      successBox.style.display = 'none';
      errorBox.style.display = 'none';

      // Generate reference number
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const ts = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}` +
                 `${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      const rand = Math.floor(1000 + Math.random() * 9000);
      const reference_number = `EDSA${ts}${rand}`;

      // Split full name
      const names = form.full_name.value.trim().split(' ');
      const first_name = names.shift() || '';
      const last_name  = names.join(' ') || '';

      // File upload logic
      let attachment_url = null;
      const file = form.attachment.files[0];
      if (file) {
        const path = `queries/${reference_number}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
        let { data: uploadData, error: uploadError } = await supabase
          .storage
          .from('attachments')
          .upload(path, file);

        if (uploadError) {
          errorBox.textContent = 'File upload failed. Please try a different file type or check your connection.';
          errorBox.style.display = 'block';
          return;
        } else {
          const { data: { publicUrl } } = supabase
            .storage
            .from('attachments')
            .getPublicUrl(path);
          attachment_url = publicUrl;
        }
      }

      // Insert query into Supabase
      const payload = {
        reference_number,
        id_number: form.id_number.value.trim(),
        first_name,
        last_name,
        email: form.email.value.trim(),
        query_text: form.query_type.value,
        additional_text: form.additional_text.value.trim(),
        branch_name: form.branch_name.value,
        attachment_url
      };

      const { data, error } = await supabase
        .from('QUERIES')
        .insert([ payload ]);

      if (error) {
        errorBox.textContent = 'There was an error submitting your query. Please try again or contact support.';
        errorBox.style.display = 'block';
      } else {
        successBox.innerHTML = `Thank you! Your query has been submitted.<br><b>Reference#:</b> ${reference_number}`;
        successBox.style.display = 'block';
        form.reset();
      }
    });
  </script>
</body>
</html>
